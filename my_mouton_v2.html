<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<link rel="icon" href="./icon_my_mouton.png">

<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Zen+Kurenaido&family=Shippori+Mincho:wght@500&display=swap');

/* ══════ OPENING ══════ */
#mm-opening{position:fixed;inset:0;z-index:9999;background:#141210;display:flex;align-items:center;justify-content:center;flex-direction:column;padding:0 24px;overflow:hidden;font-family:'Cormorant Garamond','Shippori Mincho',serif;}
#mm-opening.exit{animation:mmExit 1.6s ease forwards;}
@keyframes mmExit{to{opacity:0;filter:blur(8px);visibility:hidden;}}
.mm-grain{position:fixed;inset:-50%;width:200%;height:200%;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.35'/%3E%3C/svg%3E");animation:mmGrain .4s steps(4) infinite;pointer-events:none;z-index:2;opacity:.14;}
@keyframes mmGrain{0%{transform:translate(0,0);}25%{transform:translate(-2%,3%);}50%{transform:translate(3%,-2%);}75%{transform:translate(-3%,-3%);}100%{transform:translate(2%,2%);}}
.mm-dawn{position:fixed;inset:0;background:radial-gradient(ellipse 120% 90% at 50% 115%, #d4915820 0%, #8a5a3410 35%, transparent 65%);opacity:0;animation:mmDawn 5s ease 1s forwards;}
@keyframes mmDawn{to{opacity:1;}}
.mm-dust{position:fixed;width:3px;height:3px;background:#e8c9a0;border-radius:50%;filter:blur(1px);opacity:0;animation:mmDust 12s linear infinite;}
@keyframes mmDust{0%{opacity:0;transform:translateY(20vh) translateX(0);}15%{opacity:.5;}85%{opacity:.3;}100%{opacity:0;transform:translateY(-70vh) translateX(30px);}}
.mm-stage{position:relative;z-index:10;display:flex;align-items:center;justify-content:center;flex-direction:column;}
.mm-whisper{font-family:'Zen Kurenaido',sans-serif;font-size:clamp(11px,3vw,14px);color:#8a7560;letter-spacing:.4em;text-indent:.4em;opacity:0;animation:mmSoft 2.4s ease .8s forwards;margin-bottom:30px;}
.mm-title{display:flex;gap:.06em;font-size:clamp(44px,11vw,110px);color:#e9dcc9;font-weight:400;font-style:italic;}
.mm-title span{opacity:0;display:inline-block;animation:mmInk 2.6s cubic-bezier(.22,1,.36,1) forwards;text-shadow:0 2px 40px rgba(212,145,88,.25);}
@keyframes mmInk{0%{opacity:0;transform:translateY(26px);filter:blur(12px);}100%{opacity:1;transform:translateY(0);filter:blur(0);}}
.mm-jpsub{font-family:'Shippori Mincho',serif;font-size:clamp(12px,3.4vw,17px);color:#a08b72;letter-spacing:.85em;text-indent:.85em;margin-top:34px;opacity:0;animation:mmSoft 2.8s ease 4s forwards;}
.mm-line{width:0;height:1px;background:linear-gradient(90deg,transparent,#8a6a4a,transparent);margin-top:26px;animation:mmLineGrow 2.2s ease 4.6s forwards;}
@keyframes mmLineGrow{to{width:min(260px,60vw);}}
.mm-date{font-family:'Cormorant Garamond';font-style:italic;font-size:clamp(11px,2.6vw,14px);color:#6a5a48;letter-spacing:.25em;margin-top:22px;opacity:0;animation:mmSoft 2s ease 5.2s forwards;}
@keyframes mmSoft{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.mm-begin{margin-top:56px;background:none;border:none;border-bottom:1px solid #8a6a4a66;color:#c9b299;font-family:'Shippori Mincho',serif;font-size:15px;letter-spacing:.5em;text-indent:.5em;padding:10px 34px;cursor:pointer;opacity:0;animation:mmSoft 2.4s ease 5.8s forwards;transition:all .5s;}
.mm-begin:hover{color:#e9dcc9;border-bottom-color:#d49158;letter-spacing:.62em;}
.mm-bar{position:fixed;left:0;right:0;height:11vh;background:#0a0908;z-index:20;transition:transform 2s cubic-bezier(.7,0,.3,1);}
.mm-bar.top{top:0;} .mm-bar.bottom{bottom:0;}
.mm-bar.exit.top{transform:translateY(-100%);}
.mm-bar.exit.bottom{transform:translateY(100%);}
@media (prefers-reduced-motion: reduce){#mm-opening *{animation-duration:.01s !important;animation-delay:0s !important;}}
</style>

<style>
:root {
  --bg: #0e0e12;
  --surface: #1a1a22;
  --border: #2a2a35;
  --text: #e8e8f0;
  --sub: #888899;
  --accent: #7c6af7;
  --green: #4ade80;
  --red: #f87171;
  --yellow: #facc15;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; min-height: 100vh; padding-bottom: 80px; }

/* ── ナビ ── */
.nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-top: 1px solid var(--border); display: flex; z-index: 100; }
.nav-btn { flex: 1; padding: 10px 4px 14px; background: none; border: none; color: var(--sub); font-size: 10px; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 3px; }
.nav-btn .icon { font-size: 20px; }
.nav-btn.active { color: var(--accent); }

/* ── ページ ── */
.page { display: none; padding: 16px; }
.page.active { display: block; }

/* ── カード ── */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 12px; }
.card-title { font-size: 11px; color: var(--sub); margin-bottom: 8px; letter-spacing: .05em; text-transform: uppercase; }
.card-value { font-size: 26px; font-weight: 700; }
.card-value.red { color: var(--red); }
.card-value.green { color: var(--green); }
.card-sub { font-size: 12px; color: var(--sub); margin-top: 4px; }

/* ── グリッド ── */
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
.grid2 .card { margin-bottom: 0; }

/* ── リスト ── */
.list-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border); }
.list-item:last-child { border-bottom: none; }
.list-label { font-size: 14px; }
.list-sub { font-size: 11px; color: var(--sub); margin-top: 2px; }
.list-val { font-size: 16px; font-weight: 600; text-align: right; }
.list-val.red { color: var(--red); }
.list-val.green { color: var(--green); }

/* ── バッジ ── */
.badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 10px; font-weight: 600; }
.badge-blue { background: rgba(124,106,247,.2); color: #a89fff; }
.badge-orange { background: rgba(251,146,60,.2); color: #fb923c; }
.badge-green { background: rgba(74,222,128,.2); color: #4ade80; }

/* ── FAB ── */
.fab { position: fixed; bottom: 70px; right: 20px; width: 52px; height: 52px; border-radius: 50%; background: var(--accent); color: #fff; font-size: 24px; border: none; cursor: pointer; z-index: 200; box-shadow: 0 4px 20px rgba(124,106,247,.5); display: flex; align-items: center; justify-content: center; }

/* ── モーダル ── */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 300; align-items: flex-end; }
.modal-overlay.show { display: flex; }
.modal { background: var(--surface); border-radius: 20px 20px 0 0; padding: 24px 20px 40px; width: 100%; max-height: 85vh; overflow-y: auto; }
.modal-title { font-size: 16px; font-weight: 700; margin-bottom: 20px; }
.modal-tabs { display: flex; gap: 6px; margin-bottom: 20px; flex-wrap: wrap; }
.modal-tab { padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border); background: none; color: var(--sub); font-size: 13px; cursor: pointer; }
.modal-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.form-group { margin-bottom: 14px; }
.form-label { font-size: 12px; color: var(--sub); margin-bottom: 6px; display: block; }
.form-input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; color: var(--text); font-size: 15px; -webkit-appearance: none; }
.form-input:focus { outline: none; border-color: var(--accent); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.btn-submit { width: 100%; padding: 14px; background: var(--accent); color: #fff; border: none; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 8px; }
.btn-close { position: absolute; top: 16px; right: 20px; background: none; border: none; color: var(--sub); font-size: 22px; cursor: pointer; }

/* ── 気分ボタン ── */
.mood-btns { display: flex; gap: 8px; }
.mood-btn { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); font-size: 20px; cursor: pointer; text-align: center; }
.mood-btn.selected { border-color: var(--accent); background: rgba(124,106,247,.2); }

/* ── チャート ── */
.chart-wrap { position: relative; height: 180px; margin-top: 8px; }

/* ── セクションタイトル ── */
.section-title { font-size: 13px; color: var(--sub); margin-bottom: 10px; margin-top: 4px; letter-spacing: .04em; }

/* ── ローディング ── */
.loading { text-align: center; color: var(--sub); padding: 40px; font-size: 14px; }

/* ── ⚙設定ボタン ── */
.settings-btn { position: fixed; bottom: 130px; right: 20px; width: 36px; height: 36px; border-radius: 50%; background: rgba(255,255,255,.08); color: var(--sub); font-size: 16px; border: none; cursor: pointer; z-index: 200; display: flex; align-items: center; justify-content: center; }

/* ── toast ── */
.toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(20px); background: #333; color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 13px; opacity: 0; transition: all .3s; z-index: 400; white-space: nowrap; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── 進捗バー ── */
.progress-wrap { margin-top: 8px; }
.progress-label { display: flex; justify-content: space-between; font-size: 11px; color: var(--sub); margin-bottom: 4px; }
.progress-bar { background: var(--border); border-radius: 4px; height: 6px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 4px; background: var(--accent); transition: width .6s; }
.progress-fill.red { background: var(--red); }
</style>
</head>
<body>

<!-- ══════ OPENING ══════ -->
<div class="mm-bar top" id="mmBarTop"></div>
<div class="mm-bar bottom" id="mmBarBottom"></div>
<div id="mm-opening">
  <div class="mm-dawn"></div>
  <div class="mm-stage">
    <p class="mm-whisper">いつもの朝に、いつもの記録を</p>
    <h1 class="mm-title" id="mmTitleText"></h1>
    <p class="mm-jpsub">わたしの、暮らしの帳面</p>
    <div class="mm-line"></div>
    <p class="mm-date" id="mmDateStamp"></p>
    <button class="mm-begin" onclick="mmBeginApp()">ひらく</button>
  </div>
  <div class="mm-grain"></div>
</div>
<script>
(function(){
  var text = 'My Mouton';
  var el = document.getElementById('mmTitleText');
  for(var i=0;i<text.length;i++){
    var s=document.createElement('span');
    s.textContent = text[i]===' ' ? '\u00A0' : text[i];
    s.style.animationDelay = (1.6 + i*0.18)+'s';
    el.appendChild(s);
  }
  var d=new Date();
  var days=['SUN','MON','TUE','WED','THU','FRI','SAT'];
  document.getElementById('mmDateStamp').textContent =
    d.getFullYear()+' . '+String(d.getMonth()+1).padStart(2,'0')+' . '+String(d.getDate()).padStart(2,'0')+'  —  '+days[d.getDay()];
  for(var i=0;i<14;i++){
    var p=document.createElement('div');
    p.className='mm-dust';
    p.style.left=(10+Math.random()*80)+'vw';
    p.style.animationDelay=(Math.random()*12)+'s';
    document.getElementById('mm-opening').appendChild(p);
  }
})();
function mmBeginApp(){
  document.getElementById('mm-opening').classList.add('exit');
  document.getElementById('mmBarTop').classList.add('exit');
  document.getElementById('mmBarBottom').classList.add('exit');
  setTimeout(function(){
    document.getElementById('mm-opening').style.display='none';
    document.getElementById('mmBarTop').style.display='none';
    document.getElementById('mmBarBottom').style.display='none';
  }, 1600);
}
</script>


<!-- ナビゲーション -->
<nav class="nav">
  <button class="nav-btn active" onclick="showPage('dash')"><span class="icon">◉</span>ダッシュ</button>
  <button class="nav-btn" onclick="showPage('money')"><span class="icon">¥</span>収支</button>
  <button class="nav-btn" onclick="showPage('debt')"><span class="icon">↓</span>借金</button>
  <button class="nav-btn" onclick="showPage('account')"><span class="icon">◈</span>口座</button>
  <button class="nav-btn" onclick="showPage('shift')"><span class="icon">◷</span>シフト</button>
  <button class="nav-btn" onclick="showPage('diary')"><span class="icon">✦</span>日誌</button>
</nav>

<!-- FAB -->
<button class="fab" onclick="openModal()">＋</button>
<button class="settings-btn" onclick="openSettings()">⚙</button>
<div class="toast" id="toast"></div>

<!-- ═══════ ダッシュボード ═══════ -->
<div class="page active" id="page-dash">
  <div class="loading" id="dash-loading">読み込み中...</div>
  <div id="dash-content" style="display:none">
    <div class="grid2">
      <div class="card">
        <div class="card-title">総借金</div>
        <div class="card-value red" id="d-debt">—</div>
        <div class="card-sub" id="d-repay">月返済 —</div>
      </div>
      <div class="card">
        <div class="card-title">純資産</div>
        <div class="card-value" id="d-net">—</div>
        <div class="card-sub" id="d-asset">口座合計 —</div>
      </div>
    </div>
    <div class="grid2">
      <div class="card">
        <div class="card-title">今月収入</div>
        <div class="card-value green" id="d-income">—</div>
        <div class="card-sub" id="d-shift">シフト —</div>
      </div>
      <div class="card">
        <div class="card-title">今月支出</div>
        <div class="card-value" id="d-expense">—</div>
        <div class="card-sub" id="d-balance">残 —</div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">月別収支（直近6ヶ月）</div>
      <div class="chart-wrap"><canvas id="chart-monthly"></canvas></div>
    </div>
  </div>
</div>

<!-- ═══════ 収支 ═══════ -->
<div class="page" id="page-money">
  <div class="section-title">今月の収支</div>
  <div class="card" id="money-list"><div class="loading">読み込み中...</div></div>
</div>

<!-- ═══════ 借金 ═══════ -->
<div class="page" id="page-debt">
  <div class="section-title">借金一覧</div>
  <div id="debt-list"><div class="loading">読み込み中...</div></div>
</div>

<!-- ═══════ 口座 ═══════ -->
<div class="page" id="page-account">
  <div class="section-title">口座・残高</div>
  <div id="account-list"><div class="loading">読み込み中...</div></div>
</div>

<!-- ═══════ シフト ═══════ -->
<div class="page" id="page-shift">
  <div class="section-title">今月のシフト</div>
  <div id="shift-list"><div class="loading">読み込み中...</div></div>
  <div class="card" style="margin-top:12px">
    <div class="card-title">今月シフト収入</div>
    <div class="card-value green" id="shift-total">—</div>
    <div class="card-sub" id="shift-hours">実働 — 時間</div>
  </div>
</div>

<!-- ═══════ 日誌 ═══════ -->
<div class="page" id="page-diary">
  <div class="section-title">記録</div>
  <div id="diary-list"><div class="loading">読み込み中...</div></div>
</div>

<!-- ═══════ 入力モーダル ═══════ -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <button class="btn-close" onclick="closeModal()">✕</button>
    <div class="modal-title">記録する</div>
    <div class="modal-tabs">
      <button class="modal-tab active" onclick="switchTab('expense')">支出</button>
      <button class="modal-tab" onclick="switchTab('income')">収入</button>
      <button class="modal-tab" onclick="switchTab('shift')">シフト</button>
      <button class="modal-tab" onclick="switchTab('diary')">日誌</button>
      <button class="modal-tab" onclick="switchTab('debt')">借金更新</button>
    </div>

    <!-- 支出 -->
    <div id="tab-expense">
      <div class="form-group"><label class="form-label">日付</label><input class="form-input" type="date" id="ex-date"></div>
      <div class="form-group"><label class="form-label">金額</label><input class="form-input" type="number" id="ex-amount" placeholder="1500"></div>
      <div class="form-group"><label class="form-label">カテゴリ</label>
        <select class="form-input" id="ex-cat">
          <option>食費</option><option>交通費</option><option>日用品</option><option>外食</option>
          <option>娯楽</option><option>通信費</option><option>医療</option><option>その他</option>
        </select>
      </div>
      <div class="form-group"><label class="form-label">メモ</label><input class="form-input" type="text" id="ex-memo" placeholder="コンビニ等"></div>
      <button class="btn-submit" onclick="submit('expense')">支出を記録</button>
    </div>

    <!-- 収入 -->
    <div id="tab-income" style="display:none">
      <div class="form-group"><label class="form-label">日付</label><input class="form-input" type="date" id="in-date"></div>
      <div class="form-group"><label class="form-label">金額</label><input class="form-input" type="number" id="in-amount" placeholder="50000"></div>
      <div class="form-group"><label class="form-label">ソース</label>
        <select class="form-input" id="in-source">
          <option>バイト</option><option>LINK</option><option>Perro Mouton</option>
          <option>カシワBUKATSU</option><option>ゼロちゃん社</option><option>その他</option>
        </select>
      </div>
      <div class="form-group"><label class="form-label">メモ</label><input class="form-input" type="text" id="in-memo"></div>
      <button class="btn-submit" onclick="submit('income')">収入を記録</button>
    </div>

    <!-- シフト -->
    <div id="tab-shift" style="display:none">
      <div class="form-group"><label class="form-label">日付</label><input class="form-input" type="date" id="sh-date"></div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">開始</label><input class="form-input" type="time" id="sh-start"></div>
        <div class="form-group"><label class="form-label">終了</label><input class="form-input" type="time" id="sh-end"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">休憩(分)</label><input class="form-input" type="number" id="sh-break" value="60"></div>
        <div class="form-group"><label class="form-label">時給</label><input class="form-input" type="number" id="sh-hourly" value="1050"></div>
      </div>
      <div class="form-group"><label class="form-label">メモ</label><input class="form-input" type="text" id="sh-memo"></div>
      <button class="btn-submit" onclick="submit('shift')">シフトを記録</button>
    </div>

    <!-- 日誌 -->
    <div id="tab-diary" style="display:none">
      <div class="form-group"><label class="form-label">日付</label><input class="form-input" type="date" id="di-date"></div>
      <div class="form-group"><label class="form-label">一言メモ</label><input class="form-input" type="text" id="di-note" placeholder="今日は..."></div>
      <div class="form-group"><label class="form-label">気分</label>
        <div class="mood-btns">
          <button class="mood-btn" data-val="1" onclick="setMood(1)">😞</button>
          <button class="mood-btn" data-val="2" onclick="setMood(2)">😕</button>
          <button class="mood-btn" data-val="3" onclick="setMood(3)">😐</button>
          <button class="mood-btn" data-val="4" onclick="setMood(4)">😊</button>
          <button class="mood-btn" data-val="5" onclick="setMood(5)">😄</button>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">日誌（音声入力OK）</label>
        <textarea class="form-input" id="di-diary" rows="4" placeholder="今日あったこと、気づき..." style="resize:none" inputmode="text"></textarea>
      </div>
      <button class="btn-submit" onclick="submit('diary')">日誌を記録</button>
    </div>

    <!-- 借金更新 -->
    <div id="tab-debt" style="display:none">
      <div class="form-group"><label class="form-label">相手</label>
        <select class="form-input" id="db-id"></select>
      </div>
      <div class="form-group"><label class="form-label">新しい残高</label><input class="form-input" type="number" id="db-balance" placeholder="残高を入力"></div>
      <div class="form-group"><label class="form-label">次回返済日</label><input class="form-input" type="date" id="db-next"></div>
      <button class="btn-submit" onclick="submit('debtUpdate')">借金を更新</button>
    </div>
  </div>
</div>

<script>
var GAS_URL = 'https://script.google.com/macros/s/AKfycbxC3bwIaLFQeZlvOCs1xHrA5dcRzDhejGY8qFYJuGNjBkWnWlQ2DOK7cJcfKXPsdmi5KQ/exec';
var today = new Date().toISOString().split('T')[0];
var selectedMood = 0;
var debtData = [];
var monthlyChart = null;

// ── 初期化 ──
document.addEventListener('DOMContentLoaded', function() {
  setDefaultDates();
  loadDashboard();
});

function setDefaultDates() {
  ['ex-date','in-date','sh-date','di-date'].forEach(function(id) {
    var el = document.getElementById(id);
    if (el) el.value = today;
  });
}

// ── ページ切替 ──
function showPage(name) {
  document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });
  document.querySelectorAll('.nav-btn').forEach(function(b) { b.classList.remove('active'); });
  document.getElementById('page-' + name).classList.add('active');
  event.currentTarget.classList.add('active');
  if (name === 'money')   loadMoney();
  if (name === 'debt')    loadDebt();
  if (name === 'account') loadAccounts();
  if (name === 'shift')   loadShifts();
  if (name === 'diary')   loadDiary();
}

// ── GAS通信 ──
function gasGet(action, callback) {
  if (!GAS_URL) { callback(null); return; }
  fetch(GAS_URL + '?action=' + action, { cache: 'no-store' })
    .then(function(r) { return r.json(); })
    .then(function(res) { callback(res.ok ? res.data : null); })
    .catch(function() { callback(null); });
}

function gasPost(payload, callback) {
  if (!GAS_URL) { showToast('⚠ GAS未接続'); return; }
  fetch(GAS_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify(payload)
  })
  .then(function(r) { return r.json(); })
  .then(function(res) { if (callback) callback(res); })
  .catch(function() { showToast('❌ 送信失敗'); });
}

// ── ダッシュボード ──
function loadDashboard() {
  gasGet('dashboard', function(data) {
    document.getElementById('dash-loading').style.display = 'none';
    document.getElementById('dash-content').style.display = 'block';
    if (!data) { document.getElementById('dash-content').innerHTML = '<div class="loading">GAS未接続 — ⚙から設定してください</div>'; return; }
    document.getElementById('d-debt').textContent = '¥' + fmt(data.totalDebt);
    document.getElementById('d-repay').textContent = '月返済 ¥' + fmt(data.monthlyRepay);
    var net = data.netAsset;
    var netEl = document.getElementById('d-net');
    netEl.textContent = (net < 0 ? '-¥' : '¥') + fmt(Math.abs(net));
    netEl.className = 'card-value ' + (net < 0 ? 'red' : 'green');
    document.getElementById('d-asset').textContent = '口座合計 ¥' + fmt(data.totalAsset);
    document.getElementById('d-income').textContent = '¥' + fmt(data.monthIncome);
    document.getElementById('d-shift').textContent = 'シフト ¥' + fmt(data.monthShiftIncome);
    document.getElementById('d-expense').textContent = '¥' + fmt(data.monthExpense);
    var bal = data.monthBalance;
    document.getElementById('d-balance').textContent = '残 ' + (bal < 0 ? '-¥' : '¥') + fmt(Math.abs(bal));
    if (data.monthly) drawMonthlyChart(data.monthly);
  });
}

function drawMonthlyChart(monthly) {
  var ctx = document.getElementById('chart-monthly').getContext('2d');
  if (monthlyChart) monthlyChart.destroy();
  monthlyChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: monthly.map(function(m) { return m.month.slice(5); }),
      datasets: [
        { label: '収入', data: monthly.map(function(m) { return m.income; }), backgroundColor: 'rgba(74,222,128,.6)', borderRadius: 4 },
        { label: '支出', data: monthly.map(function(m) { return m.expense; }), backgroundColor: 'rgba(248,113,113,.6)', borderRadius: 4 }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { labels: { color: '#888', font: { size: 11 } } } },
      scales: {
        x: { ticks: { color: '#888', font: { size: 11 } }, grid: { color: '#2a2a35' } },
        y: { ticks: { color: '#888', font: { size: 10 }, callback: function(v) { return '¥' + (v/10000).toFixed(0) + 'w'; } }, grid: { color: '#2a2a35' } }
      }
    }
  });
}

// ── 収支 ──
function loadMoney() {
  gasGet('getTransactions', function(data) {
    var el = document.getElementById('money-list');
    if (!data || !data.transactions) { el.innerHTML = '<div class="loading">データなし</div>'; return; }
    var thisMonth = today.slice(0,7);
    var items = data.transactions.filter(function(r) { return (r['日付'] || '').slice(0,7) === thisMonth; });
    if (!items.length) { el.innerHTML = '<div class="loading">今月のデータなし</div>'; return; }
    el.innerHTML = items.map(function(r) {
      var isIncome = r['種別'] === '収入';
      return '<div class="list-item"><div><div class="list-label">' + (r['カテゴリ'] || '') + '</div><div class="list-sub">' + r['日付'] + ' ' + (r['メモ'] || '') + '</div></div><div class="list-val ' + (isIncome ? 'green' : 'red') + '">' + (isIncome ? '+' : '-') + '¥' + fmt(r['金額']) + '</div></div>';
    }).join('');
  });
}

// ── 借金 ──
function loadDebt() {
  gasGet('getBorrows', function(data) {
    var el = document.getElementById('debt-list');
    if (!data || !data.borrows) { el.innerHTML = '<div class="loading card">データなし</div>'; return; }
    debtData = data.borrows;
    el.innerHTML = data.borrows.map(function(r) {
      var pct = r['元金'] > 0 ? Math.round((1 - r['現残高'] / r['元金']) * 100) : 0;
      return '<div class="card"><div style="display:flex;justify-content:space-between;align-items:center"><div><div style="font-weight:600">' + r['相手'] + '</div><div class="list-sub">' + r['種別'] + ' · 残' + r['残り回数'] + '回</div></div><div style="text-align:right"><div class="list-val red">¥' + fmt(r['現残高']) + '</div><div class="list-sub">月¥' + fmt(r['月返済額']) + '</div></div></div><div class="progress-wrap"><div class="progress-label"><span>完済まで</span><span>' + pct + '%</span></div><div class="progress-bar"><div class="progress-fill" style="width:' + pct + '%"></div></div></div></div>';
    }).join('');
    // 借金更新のセレクト更新
    var sel = document.getElementById('db-id');
    sel.innerHTML = data.borrows.map(function(r) { return '<option value="' + r['ID'] + '">' + r['相手'] + ' (残¥' + fmt(r['現残高']) + ')</option>'; }).join('');
  });
}

// ── 口座 ──
function loadAccounts() {
  gasGet('getAccounts', function(data) {
    var el = document.getElementById('account-list');
    if (!data || !data.accounts) { el.innerHTML = '<div class="loading card">データなし</div>'; return; }
    el.innerHTML = '<div class="card">' + data.accounts.map(function(r) {
      return '<div class="list-item"><div><div class="list-label">' + r['口座名'] + '</div><div class="list-sub">' + r['種別'] + ' · ' + r['更新日'] + '</div></div><div class="list-val">' + (r['残高'] < 0 ? '<span class="red">-¥' + fmt(Math.abs(r['残高'])) + '</span>' : '¥' + fmt(r['残高'])) + '</div></div>';
    }).join('') + '</div>';
  });
}

// ── シフト ──
function loadShifts() {
  gasGet('getShifts', function(data) {
    var el = document.getElementById('shift-list');
    if (!data || !data.shifts) { el.innerHTML = '<div class="loading card">データなし</div>'; return; }
    var thisMonth = today.slice(0,7);
    var items = data.shifts.filter(function(r) { return (r['日付'] || '').slice(0,7) === thisMonth; });
    var total = 0, hours = 0;
    items.forEach(function(r) { total += parseFloat(r['日給']) || 0; hours += parseFloat(r['実働時間']) || 0; });
    document.getElementById('shift-total').textContent = '¥' + fmt(total);
    document.getElementById('shift-hours').textContent = '実働 ' + hours.toFixed(1) + ' 時間';
    if (!items.length) { el.innerHTML = '<div class="loading card">今月のシフトなし</div>'; return; }
    el.innerHTML = '<div class="card">' + items.map(function(r) {
      return '<div class="list-item"><div><div class="list-label">' + r['日付'] + '</div><div class="list-sub">' + r['開始'] + '〜' + r['終了'] + ' (' + r['実働時間'] + 'h)</div></div><div class="list-val green">¥' + fmt(r['日給']) + '</div></div>';
    }).join('') + '</div>';
  });
}

// ── 日誌 ──
function loadDiary() {
  gasGet('getDiary', function(data) {
    var el = document.getElementById('diary-list');
    if (!data || !data.diary) { el.innerHTML = '<div class="loading card">データなし</div>'; return; }
    var moodEmoji = ['','😞','😕','😐','😊','😄'];
    var recent = data.diary.slice(-20).reverse();
    el.innerHTML = recent.map(function(r) {
      return '<div class="card"><div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:12px;color:var(--sub)">' + r['日付'] + ' ' + (r['記録時間'] || '') + '</span><span>' + (moodEmoji[r['気分']] || '') + '</span></div><div style="font-size:14px;font-weight:600;margin-bottom:4px">' + (r['一言'] || '') + '</div>' + (r['日誌'] ? '<div style="font-size:13px;color:var(--sub);line-height:1.6">' + r['日誌'] + '</div>' : '') + '</div>';
    }).join('');
  });
}

// ── モーダル ──
function openModal() { document.getElementById('modal').classList.add('show'); }
function closeModal() { document.getElementById('modal').classList.remove('show'); }
function switchTab(name) {
  ['expense','income','shift','diary','debt'].forEach(function(t) {
    document.getElementById('tab-' + t).style.display = t === name ? 'block' : 'none';
  });
  document.querySelectorAll('.modal-tab').forEach(function(b, i) {
    b.classList.toggle('active', ['expense','income','shift','diary','debt'][i] === name);
  });
}

// ── 気分選択 ──
function setMood(val) {
  selectedMood = val;
  document.querySelectorAll('.mood-btn').forEach(function(b) {
    b.classList.toggle('selected', parseInt(b.dataset.val) === val);
  });
}

// ── フォーム送信 ──
function submit(type) {
  var payload = {};
  if (type === 'expense') {
    payload = { action: 'addTransaction', date: document.getElementById('ex-date').value, type: '支出', category: document.getElementById('ex-cat').value, amount: document.getElementById('ex-amount').value, memo: document.getElementById('ex-memo').value };
  } else if (type === 'income') {
    payload = { action: 'addTransaction', date: document.getElementById('in-date').value, type: '収入', category: document.getElementById('in-source').value, amount: document.getElementById('in-amount').value, memo: document.getElementById('in-memo').value };
  } else if (type === 'shift') {
    payload = { action: 'addShift', date: document.getElementById('sh-date').value, start: document.getElementById('sh-start').value, end: document.getElementById('sh-end').value, break: document.getElementById('sh-break').value, hourly: document.getElementById('sh-hourly').value, memo: document.getElementById('sh-memo').value };
  } else if (type === 'diary') {
    payload = { action: 'addDiary', date: document.getElementById('di-date').value, note: document.getElementById('di-note').value, mood: selectedMood, diary: document.getElementById('di-diary').value };
  } else if (type === 'debtUpdate') {
    payload = { action: 'updateBorrow', id: document.getElementById('db-id').value, newBalance: document.getElementById('db-balance').value, nextDate: document.getElementById('db-next').value };
  }
  gasPost(payload, function(res) {
    if (res.ok) { showToast('✅ 記録しました'); closeModal(); loadDashboard(); }
    else showToast('❌ ' + (res.error || 'エラー'));
  });
}

// ── 設定 ──
function openSettings() {
  var url = prompt('GASのデプロイURLを入力\n（一度設定すれば次回から不要）', GAS_URL);
  if (url !== null) {
    GAS_URL = url.trim();
    localStorage.setItem('my_mouton_gas_url', GAS_URL);
    showToast(GAS_URL ? '✅ GAS接続設定完了' : '🔌 未接続モード');
    if (GAS_URL) loadDashboard();
  }
}

// ── ユーティリティ ──
function fmt(n) { return Number(n || 0).toLocaleString('ja-JP'); }
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2200);
}
</script>
