<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#17171a">
<title>Mouton's</title>
<link rel="manifest" href="manifest.json">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  html, body { margin:0; padding:0; background:#17171a; overscroll-behavior:none; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useRef, useEffect } = React;

function MoutonsDashboard() {
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbwS99nXzXJa8g6QElQYBkXFCoPYvNArmbhbh7z3yNNWmlGbuCHaC717SZ9kcbC5nH3L5g/exec';

  const [liveContent, setLiveContent] = useState(null); // getDailyContent結果
  const [liveSummary, setLiveSummary] = useState(null);  // getDailySummary結果
  const [liveLoading, setLiveLoading] = useState(true);
  const [liveError, setLiveError] = useState(false);
  const [saveStatus, setSaveStatus] = useState(''); // '' | 'saving' | 'saved' | 'error'

  const [showIntro, setShowIntro] = useState(true);
  const [introPhase, setIntroPhase] = useState('welcome'); // welcome | showtime | out
  const [activeMain, setActiveMain] = useState('home'); // home | feed | record | business
  const [businessPanel, setBusinessPanel] = useState(0);
  const [feedTab, setFeedTab] = useState('croppy');
  const [recordTab, setRecordTab] = useState('post');
  const [copiedId, setCopiedId] = useState(null);
  const [postAccount, setPostAccount] = useState('zero');
  const [postContent, setPostContent] = useState('');
  const [postTime, setPostTime] = useState('');
  const [savedPosts, setSavedPosts] = useState([
    { id: 'p1', account: 'zero', content: 'また朝から机に向かってるけど、コーヒー冷めてるの気づいてます？', time: '08:30' },
    { id: 'p2', account: 'otsunagi', content: 'また一件、繋がりが生まれました。', time: '12:10' },
  ]);
  const [selectedPostId, setSelectedPostId] = useState('p1');
  const [reactionDraft, setReactionDraft] = useState({ likes: '', reposts: '', repliesCount: '' });
  const [replyPairs, setReplyPairs] = useState([{ from: '', content: '', response: '' }]);

  const bizStripRef = useRef(null);
  const [dateStr, setDateStr] = useState('');

  useEffect(() => {
    const d = new Date();
    const w = ['SUN','MON','TUE','WED','THU','FRI','SAT'][d.getDay()];
    setDateStr(`${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} ${w}`);
    const hh = String(d.getHours()).padStart(2,'0');
    const mm = String(d.getMinutes()).padStart(2,'0');
    setPostTime(`${hh}:${mm}`);
  }, []);

  useEffect(() => {
    const load = async () => {
      try {
        const [contentRes, summaryRes, postsRes] = await Promise.all([
          fetch(`${GAS_URL}?action=getDailyContent`).then(r => r.json()).catch(() => null),
          fetch(`${GAS_URL}?action=getDailySummary`).then(r => r.json()).catch(() => null),
          fetch(`${GAS_URL}?action=getRecentPosts&limit=10`).then(r => r.json()).catch(() => null)
        ]);
        if (contentRes && contentRes.status === 'ok') setLiveContent(contentRes.content);
        if (summaryRes && summaryRes.status === 'ok') setLiveSummary(summaryRes.summary);
        if (postsRes && postsRes.status === 'ok' && postsRes.posts && postsRes.posts.length) {
          setSavedPosts(postsRes.posts);
        }
      } catch (err) {
        setLiveError(true);
      } finally {
        setLiveLoading(false);
      }
    };
    load();
  }, []);

  const submitPost = async () => {
    if (!postContent.trim()) return;
    setSaveStatus('saving');
    const id = 'p' + Date.now();
    const newPost = { id, account: postAccount, content: postContent, time: postTime };
    setSavedPosts([newPost, ...savedPosts]);
    setPostContent('');
    try {
      const res = await fetch(GAS_URL, {
        method: 'POST',
        body: JSON.stringify({
          type: 'post',
          account: postAccount,
          content: newPost.content,
          time: postTime,
          date: new Date().toISOString().slice(0,10)
        })
      });
      const data = await res.json().catch(() => ({}));
      setSaveStatus(data && data.status === 'ok' ? 'saved' : 'error');
    } catch (err) {
      setSaveStatus('error');
    }
    setTimeout(() => setSaveStatus(''), 1800);
  };

  const submitReaction = async () => {
    setSaveStatus('saving');
    try {
      const res = await fetch(GAS_URL, {
        method: 'POST',
        body: JSON.stringify({
          type: 'reaction',
          postId: selectedPostId,
          likes: Number(reactionDraft.likes) || 0,
          reposts: Number(reactionDraft.reposts) || 0,
          repliesCount: Number(reactionDraft.repliesCount) || 0,
          replies: replyPairs.filter(r => r.from || r.content)
        })
      });
      const data = await res.json().catch(() => ({}));
      setSaveStatus(data && data.status === 'ok' ? 'saved' : 'error');
      if (data && data.status === 'ok') {
        setReactionDraft({ likes:'', reposts:'', repliesCount:'' });
        setReplyPairs([{ from:'', content:'', response:'' }]);
      }
    } catch (err) {
      setSaveStatus('error');
    }
    setTimeout(() => setSaveStatus(''), 1800);
  };

  useEffect(() => {
    const t1 = setTimeout(() => setIntroPhase('showtime'), 1700);
    const t2 = setTimeout(() => setIntroPhase('out'), 3200);
    const t3 = setTimeout(() => setShowIntro(false), 3900);
    return () => { clearTimeout(t1); clearTimeout(t2); clearTimeout(t3); };
  }, []);

  const particles = useRef(
    Array.from({ length: 34 }, () => ({
      left: Math.random() * 100,
      top: Math.random() * 100,
      size: 1 + Math.random() * 2.4,
      delay: Math.random() * 3,
      dur: 3 + Math.random() * 3
    }))
  ).current;

  const handleBizScroll = () => {
    if (!bizStripRef.current) return;
    const idx = Math.round(bizStripRef.current.scrollLeft / window.innerWidth);
    setBusinessPanel(idx);
  };
  const scrollToBiz = (idx) => {
    if (bizStripRef.current) {
      bizStripRef.current.scrollTo({ left: idx * window.innerWidth, behavior: 'smooth' });
      setBusinessPanel(idx);
    }
  };

  const copyText = (text, id) => {
    if (navigator.clipboard) navigator.clipboard.writeText(text).catch(() => {});
    setCopiedId(id);
    setTimeout(() => setCopiedId(null), 1600);
  };

  const mockCroppyAnalysis = {
    focus: '今日は準備より実行の日',
    body: '昨日の記録、ちゃんと入ってる。この調子で3日続けば、それはもう仕組みです。スポログUIは一区切りつけて、午後は千葉ホークスの機材確認に時間を使うのが良さそう。',
    signals: ['BUKATSU参加が微増傾向', 'LINK接触が2日停滞中', 'おつなぎ屋の審査待ちが1件残ってる']
  };
  const isLive = !!liveContent;
  const croppyAnalysis = isLive ? { focus: liveContent.croppyFocus, body: liveContent.croppyBody, signals: liveContent.croppySignals || [] } : mockCroppyAnalysis;

  // ---- SCHEDULE (05:00起点。GAS/Googleカレンダー連携時はここをfetch結果に差し替え) ----
  const DAY_START = 5;   // 05:00
  const DAY_END = 25;    // 25:00 = 翌1:00（延長ゾーンの限界ライン）
  const EXT_ZONE = 22;   // 22:00以降は延長ゾーン
  const scheduleEvents = [
    { title: 'もずくさんのお店決起会', start: 13, end: 15 },
  ];
  const toHM = (h) => {
    const hh = Math.floor(h) % 24;
    const mm = Math.round((h % 1) * 60);
    return `${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}`;
  };
  const buildTimeline = () => {
    const sorted = [...scheduleEvents].sort((a,b) => a.start - b.start);
    const blocks = [];
    let cursor = DAY_START;
    sorted.forEach(ev => {
      if (ev.start > cursor) blocks.push({ type:'free', start:cursor, end: ev.start });
      blocks.push({ type:'event', ...ev });
      cursor = Math.max(cursor, ev.end);
    });
    if (cursor < DAY_END) blocks.push({ type:'free', start:cursor, end: DAY_END });
    return blocks;
  };
  const timelineBlocks = buildTimeline();
  const nowHour = (() => {
    const d = new Date();
    return d.getHours() + d.getMinutes()/60;
  })();
  const mockZeroPosts = [
    'また朝から机に向かってるけど、コーヒー冷めてるの気づいてます？ボスの集中力、10分持てば褒めてあげる。',
    'スポログのアイコン、また描き直してる。「本気版」の意味、何個目の下書きで見つかるんだろうね。',
    '今日もカシワのBUKATSUは何事もなく回ってました。地味に、それが一番すごいことだったりする。'
  ];
  const mockOtsunagiPosts = [
    'また一件、繋がりが生まれました。派手じゃないけど、誰かの「助かった」が積み重なる場所でありたいです。',
    '審査で見ているのは実績じゃなくて、その人の言葉の温度です。今日もそんな出会いがありました。',
    '紹介した先で、想像より良い関係が育ってると聞くと、この仕組みを作ってよかったと思います。'
  ];
  const mockShoheyPost = 'カシワのBUKATSU、今日も体育館に集まってくれた皆さんありがとうございました。バドミントンもバスケも、上手さより「今日も来た」が一番の価値だと思ってます。明日も待ってます。';

  const zeroPosts = isLive && liveContent.zeroPosts && liveContent.zeroPosts.length ? liveContent.zeroPosts : mockZeroPosts;
  const otsunagiPosts = isLive && liveContent.otsunagiPosts && liveContent.otsunagiPosts.length ? liveContent.otsunagiPosts : mockOtsunagiPosts;
  const shoheyPost = isLive && liveContent.shoheyPost ? liveContent.shoheyPost : mockShoheyPost;

  const feedTabs = [
    { id: 'croppy', label: 'クロッピー分析' },
    { id: 'zero', label: 'ゼロちゃん' },
    { id: 'otsunagi', label: 'おつなぎ屋' },
    { id: 'shohey', label: 'しょーへい' }
  ];

  const accountLabels = { zero: 'ゼロちゃん', otsunagi: 'おつなぎ屋', shohey: 'しょーへい' };

  const sectionPanels = [
    { no: '01 — COMMUNITY', title: 'カシワの\nBUKATSU', sub: '130人の、まちの部活動。',
      stats: [{k:'今月の参加のべ',v:'96',u:'名'},{k:'今月売上',v:'¥52,300',u:''},{k:'スポログ達成',v:'4',u:'人'},{k:'新規体験',v:'3',u:'名'}],
      links: [{text:'会員アプリ',url:'https://shohey-otsunagiya.github.io/Moutons/app.html'},{text:'スタッフ',url:'https://shohey-otsunagiya.github.io/Moutons/staff.html'},{text:'管理',url:'https://shohey-otsunagiya.github.io/Moutons/admin.html'}] },
    { no: '02 — MEDIA', title: 'SNS / ゼロちゃん', sub: 'ボスを見て、呆れて、報告する。',
      stats: [{k:'今週の投稿',v:'9',u:'本'},{k:'ストック',v:'12',u:'本'},{k:'週次ループ',v:'未稼働',u:''},{k:'note',v:'2',u:'本'}],
      links: [{text:'SNS Cockpit',url:'https://shohey-otsunagiya.github.io/Moutons/'}] },
    { no: '03 — CONNECT', title: 'おつなぎ屋', sub: '人と人を、無料でつなぐ。',
      stats: [{k:'今週の応募',v:'2',u:'件'},{k:'今週の成立',v:'1',u:'件'},{k:'累計成立',v:'14',u:'件'},{k:'審査待ち',v:'1',u:'件'}],
      links: [{text:'LP を開く',url:'https://shohey-otsunagiya.github.io/'}] },
    { no: '04 — NETWORK', title: 'LINK', sub: '千葉のハブとして。',
      stats: [{k:'今週の接触',v:'5',u:'件'},{k:'MASAKIさんへ',v:'1',u:'件'},{k:'温度高リード',v:'2',u:'件'},{k:'今月成約',v:'1',u:'件'}],
      note: '3層分離は絶対。カシワコミュニティ / LINKビジネス層 / 将来幹部層。',
      links: [{text:'営業本部DB',url:'#'}] },
    { no: '05 — VISUAL', title: 'Perro Mouton', sub: '記録を、記憶に。',
      stats: [{k:'進行中案件',v:'1',u:'件'},{k:'今月撮影',v:'2',u:'本'},{k:'今月売上',v:'¥30,000',u:''},{k:'納品待ち',v:'0',u:'件'}],
      note: '次: 千葉ホークス プロフィール撮影。2灯スタジオ、機材リスト要確認。',
      links: [{text:'案件メモ',url:'#'}] }
  ];

  const cardStyle = { border:'1px solid rgba(255,255,255,0.08)', borderRadius:'14px', padding:'16px 18px', fontSize:'13.5px', lineHeight:1.8, color:'#e9e7e2', marginBottom:'12px', position:'relative' };
  const copyBtnStyle = (active) => ({ marginTop:'10px', fontFamily:"'Inter', sans-serif", fontSize:'10px', letterSpacing:'0.16em', color: active?'#0c0d0f':'#c8a86b', background: active?'#c8a86b':'transparent', border:'1px solid '+(active?'#c8a86b':'rgba(200,168,107,0.35)'), borderRadius:'20px', padding:'6px 14px', cursor:'pointer', transition:'all 0.2s' });
  const labelStyle = { fontFamily:"'Inter', sans-serif", fontSize:'10px', letterSpacing:'0.24em', color:'#8d8b86', marginBottom:'8px', textTransform:'uppercase' };
  const inputStyle = { width:'100%', background:'rgba(255,255,255,0.03)', border:'1px solid rgba(255,255,255,0.1)', borderRadius:'10px', padding:'12px 14px', color:'#e9e7e2', fontSize:'14px', fontFamily:"'Zen Kaku Gothic New', sans-serif", marginBottom:'18px', boxSizing:'border-box' };
  const chipStyle = (active) => ({ fontFamily:"'Inter', sans-serif", fontSize:'12px', padding:'9px 16px', borderRadius:'20px', border:'1px solid '+(active?'#c8a86b':'rgba(255,255,255,0.1)'), background: active?'rgba(200,168,107,0.12)':'transparent', color: active?'#c8a86b':'#8d8b86', cursor:'pointer', transition:'all .2s', whiteSpace:'nowrap', flexShrink:0, lineHeight:1.4, display:'inline-block' });
  const primaryBtn = { width:'100%', background:'#c8a86b', color:'#0c0d0f', border:'none', borderRadius:'12px', padding:'14px', fontSize:'13px', fontWeight:600, letterSpacing:'0.06em', cursor:'pointer', marginTop:'8px' };



  const addReplyPair = () => setReplyPairs([...replyPairs, { from:'', content:'', response:'' }]);
  const updateReplyPair = (idx, field, val) => {
    const next = [...replyPairs];
    next[idx][field] = val;
    setReplyPairs(next);
  };
  const removeReplyPair = (idx) => setReplyPairs(replyPairs.filter((_, i) => i !== idx));

  const mainTabs = [
    { id: 'home', label: 'HOME' },
    { id: 'feed', label: '発信' },
    { id: 'record', label: '記録' },
    { id: 'business', label: 'Business' }
  ];

  const pagePad = { minWidth:'100vw', height:'100%', display:'flex', flexDirection:'column', padding:'20px 24px 24px', overflowY:'auto', position:'relative', boxSizing:'border-box' };
  const bgGlow = <div style={{ position:'fixed', inset:0, pointerEvents:'none', background:'radial-gradient(120% 60% at 50% -10%, rgba(200,168,107,0.06), transparent 60%)', zIndex:-1 }}></div>;

  return (
    <div style={{ width:'100vw', height:'100dvh', background:'#17171a', fontFamily:"'Zen Kaku Gothic New', sans-serif", overflow:'hidden', color:'#e9e7e2', display:'flex', flexDirection:'column' }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@400;600&family=Zen+Kaku+Gothic+New:wght@300;400;500;700&family=Inter:wght@300;400;500&display=swap');
        @keyframes nudge { 0%,100% { transform: translateX(0); } 50% { transform: translateX(5px); } }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
        @keyframes pulseDot { 0%,100% { opacity: 1; box-shadow: 0 0 0 0 rgba(200,168,107,0.5); } 50% { opacity: 0.7; box-shadow: 0 0 0 6px rgba(200,168,107,0); } }
        @keyframes silverSweep { 0% { transform: translateX(-120%); } 100% { transform: translateX(220%); } }
        @keyframes floatParticle { 0%,100% { transform: translateY(0) scale(1); opacity: 0.15; } 50% { transform: translateY(-14px) scale(1.3); opacity: 0.6; } }
        @keyframes introTextIn { 0% { opacity:0; letter-spacing: 0.5em; filter: blur(6px); } 100% { opacity:1; letter-spacing: 0.08em; filter: blur(0); } }
        @keyframes introFadeOut { to { opacity: 0; } }
        body { margin:0; padding:0; }
        ::-webkit-scrollbar { display:none; }
        input[type=number]::-webkit-inner-spin-button { opacity: 1; }
        .shimmer-title {
          background: linear-gradient(100deg, #e9e7e2 30%, #c8a86b 45%, #f5eeda 50%, #c8a86b 55%, #e9e7e2 70%);
          background-size: 250% 100%;
          -webkit-background-clip: text;
          background-clip: text;
          color: transparent;
          animation: shimmer 6s ease-in-out infinite;
        }
        .silver-line { position: relative; overflow: hidden; }
        .silver-line::after {
          content: "";
          position: absolute; top:0; left:0; height:100%; width:40%;
          background: linear-gradient(90deg, transparent, rgba(220,220,225,0.5), transparent);
          animation: silverSweep 5s ease-in-out infinite;
        }
      `}</style>

      {showIntro && (
        <div style={{
          position:'fixed', inset:0, zIndex:100, background:'#101012',
          display:'flex', alignItems:'center', justifyContent:'center',
          animation: introPhase === 'out' ? 'introFadeOut 0.7s ease forwards' : 'none'
        }}>
          {particles.map((p, i) => (
            <div key={i} style={{
              position:'absolute', left:`${p.left}%`, top:`${p.top}%`,
              width:`${p.size}px`, height:`${p.size}px`, borderRadius:'50%',
              background: i % 3 === 0 ? '#c8a86b' : '#d9d9de',
              animation: `floatParticle ${p.dur}s ease-in-out ${p.delay}s infinite`
            }}></div>
          ))}
          <div style={{ position:'relative', textAlign:'center', padding:'0 24px' }}>
            {introPhase === 'welcome' && (
              <div style={{
                fontFamily:"'Shippori Mincho B1', serif", fontSize:'clamp(20px,6vw,28px)',
                color:'#e9e7e2', animation:'introTextIn 1.1s ease forwards'
              }}>
                Welcome back SHOHEY.
              </div>
            )}
            {(introPhase === 'showtime' || introPhase === 'out') && (
              <div style={{
                fontFamily:"'Shippori Mincho B1', serif", fontWeight:600, fontSize:'clamp(28px,8vw,42px)',
                background:'linear-gradient(100deg, #e9e7e2 20%, #c8a86b 45%, #f5eeda 55%, #c8a86b 65%, #e9e7e2 80%)',
                backgroundSize:'250% 100%', WebkitBackgroundClip:'text', backgroundClip:'text', color:'transparent',
                animation:'introTextIn 1s ease forwards, shimmer 3s ease-in-out infinite'
              }}>
                It's Show Time.
              </div>
            )}
          </div>
        </div>
      )}

      <div style={{ flex:1, overflow:'hidden', position:'relative' }}>

        {/* HOME */}
        {activeMain === 'home' && (
          <div style={{ ...pagePad, height:'100%' }}>
            {bgGlow}
            <div style={{ margin:'6vh 0 4vh' }}>
              <div style={{ fontFamily:"'Inter', sans-serif", fontSize:'12px', letterSpacing:'0.2em', color:'#8d8b86', marginBottom:'10px' }}>{dateStr}</div>
              <div className="silver-line" style={{ height:'1px', background:'rgba(255,255,255,0.08)', marginBottom:'18px', width:'56px' }}></div>
              <h1 className="shimmer-title" style={{ fontFamily:"'Shippori Mincho B1', serif", fontWeight:600, fontSize:'clamp(28px,8vw,40px)', lineHeight:1.2, margin:0 }}>おはよう、<br/>SHOHEY。</h1>
              <p style={{ color:'#8d8b86', fontSize:'13px', fontWeight:300, marginTop:'6px', margin:0 }}>今日も静かに、確実に。</p>
            </div>

            <div style={{ borderTop:'1px solid rgba(200,168,107,0.25)', padding:'22px 0' }}>
              <div style={{ display:'flex', justifyContent:'space-between', alignItems:'baseline', marginBottom:'16px' }}>
                <div style={labelStyle}>Today's Schedule</div>
                <div style={{ fontFamily:"'Inter', sans-serif", fontSize:'10px', color:'#8d8b86' }}>05:00 起点</div>
              </div>

              <div style={{ display:'flex', flexDirection:'column', gap:'2px' }}>
                {timelineBlocks.map((b, i) => {
                  const durH = b.end - b.start;
                  const heightPx = Math.max(durH * 26, 30);
                  if (b.type === 'event') {
                    return (
                      <div key={i} style={{
                        minHeight: heightPx, borderRadius:'10px',
                        background:'linear-gradient(135deg, rgba(200,168,107,0.16), rgba(200,168,107,0.05))',
                        border:'1px solid rgba(200,168,107,0.4)',
                        padding:'10px 14px', display:'flex', flexDirection:'column', justifyContent:'center', position:'relative'
                      }}>
                        <div style={{ position:'absolute', left:0, top:0, bottom:0, width:'3px', background:'#c8a86b', borderRadius:'3px 0 0 3px' }}></div>
                        <div style={{ fontFamily:"'Inter', sans-serif", fontSize:'10px', color:'#c8a86b', letterSpacing:'0.06em', marginBottom:'4px' }}>{toHM(b.start)} – {toHM(b.end)}</div>
                        <div style={{ fontSize:'13px', fontWeight:500 }}>{b.title}</div>
                      </div>
                    );
                  }
                  const isExtended = b.start >= EXT_ZONE || b.end > EXT_ZONE;
                  return (
                    <div key={i} style={{
                      minHeight: heightPx, borderRadius:'10px',
                      border:'1px dashed rgba(255,255,255,0.12)',
                      padding:'10px 14px', display:'flex', alignItems:'center', justifyContent:'space-between',
                      opacity: isExtended ? 0.45 : 1
                    }}>
                      <span style={{ fontFamily:"'Inter', sans-serif", fontSize:'10px', color:'#8d8b86', letterSpacing:'0.06em' }}>{toHM(b.start)} – {toHM(Math.min(b.end, EXT_ZONE))}{b.end > EXT_ZONE ? ' (延長可)' : ''}</span>
                      <span style={{ fontFamily:"'Inter', sans-serif", fontSize:'11px', color:'#e9e7e2', fontWeight:300 }}>
                        空き {durH >= 1 ? `${Math.floor(durH)}h${durH%1 ? Math.round((durH%1)*60)+'m' : ''}` : `${Math.round(durH*60)}m`}
                      </span>
                    </div>
                  );
                })}
              </div>

              {nowHour >= DAY_START && nowHour <= DAY_END && (
                <div style={{ display:'flex', alignItems:'center', gap:'8px', marginTop:'14px' }}>
                  <div style={{ width:'6px', height:'6px', borderRadius:'50%', background:'#c8a86b', animation:'pulseDot 2s ease-in-out infinite' }}></div>
                  <span style={{ fontFamily:"'Inter', sans-serif", fontSize:'10px', color:'#8d8b86', letterSpacing:'0.08em' }}>NOW {toHM(nowHour)}</span>
                </div>
              )}
            </div>

            <div style={{ borderTop:'1px solid rgba(255,255,255,0.08)', padding:'22px 0' }}>
              <div style={{ display:'flex', alignItems:'center', gap:'8px', marginBottom:'16px' }}>
                <div style={{ fontFamily:"'Inter', sans-serif", fontSize:'10px', letterSpacing:'0.28em', textTransform:'uppercase', color:'#8d8b86' }}>Yesterday</div>
                <div style={{ width:'5px', height:'5px', borderRadius:'50%', background: liveLoading ? '#8d8b86' : (liveSummary ? '#c8a86b' : '#5a5854') }}></div>
              </div>
              <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'18px 12px' }}>
                <div><div style={{ fontSize:'11px', color:'#8d8b86', marginBottom:'4px' }}>BUKATSU 参加</div><div style={{ fontFamily:"'Inter', sans-serif", fontSize:'24px', fontWeight:300 }}>{liveSummary?.bukatsu?.['参加人数'] ?? 8}<small style={{ fontSize:'12px', color:'#8d8b86', marginLeft:'2px' }}>名</small></div></div>
                <div><div style={{ fontSize:'11px', color:'#8d8b86', marginBottom:'4px' }}>BUKATSU 売上</div><div style={{ fontFamily:"'Inter', sans-serif", fontSize:'24px', fontWeight:300 }}>¥{(liveSummary?.bukatsu?.['売上'] ?? 4200).toLocaleString()}</div></div>
                <div><div style={{ fontSize:'11px', color:'#8d8b86', marginBottom:'4px' }}>LINK 接触</div><div style={{ fontFamily:"'Inter', sans-serif", fontSize:'24px', fontWeight:300 }}>{liveSummary?.link?.['接触数'] ?? 2}<small style={{ fontSize:'12px', color:'#8d8b86', marginLeft:'2px' }}>件</small></div></div>
                <div><div style={{ fontSize:'11px', color:'#8d8b86', marginBottom:'4px' }}>おつなぎ 成立</div><div style={{ fontFamily:"'Inter', sans-serif", fontSize:'24px', fontWeight:300 }}>{liveSummary?.otsunagi?.['成立数'] ?? 1}<small style={{ fontSize:'12px', color:'#8d8b86', marginLeft:'2px' }}>件</small></div></div>
              </div>
            </div>

            <div style={{ borderTop:'1px solid rgba(255,255,255,0.08)', padding:'22px 0' }}>
              <div style={labelStyle}>Today — 3つだけ</div>
              <ul style={{ listStyle:'none', display:'flex', flexDirection:'column', gap:'14px', margin:0, padding:0 }}>
                <li style={{ display:'flex', gap:'14px', alignItems:'baseline', fontSize:'14px' }}><span style={{ fontFamily:"'Inter', sans-serif", fontSize:'11px', color:'#c8a86b' }}>01</span>スポログUI 本気版の続き</li>
                <li style={{ display:'flex', gap:'14px', alignItems:'baseline', fontSize:'14px' }}><span style={{ fontFamily:"'Inter', sans-serif", fontSize:'11px', color:'#c8a86b' }}>02</span>千葉ホークス 撮影機材の確保</li>
                <li style={{ display:'flex', gap:'14px', alignItems:'baseline', fontSize:'14px' }}><span style={{ fontFamily:"'Inter', sans-serif", fontSize:'11px', color:'#c8a86b' }}>03</span>MASAKIさんへ 進捗共有</li>
              </ul>
            </div>

            <div style={{ borderTop:'1px solid rgba(255,255,255,0.08)', padding:'22px 0' }}>
              <div style={labelStyle}>Croppy</div>
              <p style={{ fontFamily:"'Shippori Mincho B1', serif", fontSize:'15px', lineHeight:2, borderLeft:'1px solid rgba(200,168,107,0.35)', paddingLeft:'18px', margin:0 }}>{croppyAnalysis.body}</p>
              <div style={{ fontFamily:"'Inter', sans-serif", fontSize:'10px', letterSpacing:'0.24em', color:'#8d8b86', marginTop:'12px', paddingLeft:'19px' }}>— CROPPY, ISAI MOUTON</div>
            </div>
          </div>
        )}

        {/* FEED */}
        {activeMain === 'feed' && (
          <div style={{ ...pagePad, height:'100%' }}>
            {bgGlow}
            <div style={{ margin:'6vh 0 3vh' }}>
              <div style={{ fontFamily:"'Inter', sans-serif", fontSize:'11px', letterSpacing:'0.3em', color:'#c8a86b', marginBottom:'12px' }}>DAILY OUTPUT</div>
              <h2 style={{ fontFamily:"'Shippori Mincho B1', serif", fontWeight:600, fontSize:'clamp(26px,7vw,36px)', lineHeight:1.2, margin:0 }}>今日の発信</h2>
              <p style={{ color:'#8d8b86', fontSize:'13px', fontWeight:300, marginTop:'6px', margin:0 }}>分析とコピー、タップして即コピー。</p>
            </div>

            <div style={{ display:'flex', flexWrap:'nowrap', alignItems:'center', gap:'8px', minHeight:'52px', borderBottom:'1px solid rgba(255,255,255,0.08)', paddingTop:'6px', paddingBottom:'14px', marginBottom:'28px', overflowX:'auto', overflowY:'hidden', WebkitOverflowScrolling:'touch' }}>
              {feedTabs.map(t => (
                <button key={t.id} onClick={() => setFeedTab(t.id)} style={chipStyle(feedTab === t.id)}>{t.label}</button>
              ))}
            </div>

            <div style={{ flex:1 }}>
              {feedTab === 'croppy' && (
                <div>
                  <div style={{ ...labelStyle, marginTop:'4px' }}>Focus</div>
                  <div style={cardStyle}>
                    <div style={{ fontFamily:"'Shippori Mincho B1', serif", fontSize:'16px', marginBottom:'10px', color:'#c8a86b' }}>{croppyAnalysis.focus}</div>
                    {croppyAnalysis.body}
                  </div>
                  <div style={{ ...labelStyle, margin:'20px 0 10px' }}>Signals</div>
                  {croppyAnalysis.signals.map((s,i) => (<div key={i} style={{ ...cardStyle, fontSize:'12.5px', color:'#c9c7c2', padding:'12px 16px' }}>・{s}</div>))}
                </div>
              )}
              {feedTab === 'zero' && zeroPosts.map((p,i) => (
                <div key={i} style={cardStyle}>{p}
                  <div><button style={copyBtnStyle(copiedId===`zero-${i}`)} onClick={()=>copyText(p,`zero-${i}`)}>{copiedId===`zero-${i}`?'コピーしました':'コピー'}</button></div>
                </div>
              ))}
              {feedTab === 'otsunagi' && otsunagiPosts.map((p,i) => (
                <div key={i} style={cardStyle}>{p}
                  <div><button style={copyBtnStyle(copiedId===`otsu-${i}`)} onClick={()=>copyText(p,`otsu-${i}`)}>{copiedId===`otsu-${i}`?'コピーしました':'コピー'}</button></div>
                </div>
              ))}
              {feedTab === 'shohey' && (
                <div style={cardStyle}>{shoheyPost}
                  <div><button style={copyBtnStyle(copiedId==='shohey-0')} onClick={()=>copyText(shoheyPost,'shohey-0')}>{copiedId==='shohey-0'?'コピーしました':'コピー'}</button></div>
                </div>
              )}
            </div>
          </div>
        )}

        {/* RECORD */}
        {activeMain === 'record' && (
          <div style={{ ...pagePad, height:'100%' }}>
            {bgGlow}
            <div style={{ margin:'6vh 0 3vh' }}>
              <div style={{ fontFamily:"'Inter', sans-serif", fontSize:'11px', letterSpacing:'0.3em', color:'#c8a86b', marginBottom:'12px' }}>ARCHIVE</div>
              <h2 style={{ fontFamily:"'Shippori Mincho B1', serif", fontWeight:600, fontSize:'clamp(26px,7vw,36px)', lineHeight:1.2, margin:0 }}>記録</h2>
              <p style={{ color:'#8d8b86', fontSize:'13px', fontWeight:300, marginTop:'6px', margin:0 }}>投稿と反応を、繋がりとして残す。</p>
            </div>

            <div style={{ display:'flex', flexWrap:'nowrap', alignItems:'center', gap:'8px', minHeight:'52px', borderBottom:'1px solid rgba(255,255,255,0.08)', paddingTop:'6px', paddingBottom:'14px', marginBottom:'28px' }}>
              <button style={chipStyle(recordTab==='post')} onClick={()=>setRecordTab('post')}>投稿記録</button>
              <button style={chipStyle(recordTab==='reaction')} onClick={()=>setRecordTab('reaction')}>反応記録</button>
            </div>

            {recordTab === 'post' && (
              <div>
                <div style={labelStyle}>アカウント</div>
                <div style={{ display:'flex', flexWrap:'nowrap', alignItems:'center', gap:'8px', minHeight:'52px', marginBottom:'18px', overflowX:'auto', overflowY:'hidden' }}>
                  {Object.entries(accountLabels).map(([k,v]) => (
                    <button key={k} style={chipStyle(postAccount===k)} onClick={()=>setPostAccount(k)}>{v}</button>
                  ))}
                </div>

                <div style={labelStyle}>投稿内容</div>
                <textarea style={{ ...inputStyle, minHeight:'90px', resize:'vertical' }} value={postContent} onChange={e=>setPostContent(e.target.value)} placeholder="投稿した内容を貼り付け" />

                <div style={labelStyle}>投稿時刻（時差投稿は修正可）</div>
                <input style={inputStyle} type="time" value={postTime} onChange={e=>setPostTime(e.target.value)} />

                <button style={primaryBtn} onClick={submitPost}>{saveStatus==='saving' ? '保存中…' : saveStatus==='saved' ? '保存しました ✓' : saveStatus==='error' ? '保存失敗（再試行）' : '記録する'}</button>

                <div style={{ ...labelStyle, margin:'26px 0 10px' }}>最近の投稿</div>
                {savedPosts.map(p => (
                  <div key={p.id} style={{ ...cardStyle, fontSize:'12.5px' }}>
                    <div style={{ display:'flex', justifyContent:'space-between', marginBottom:'6px' }}>
                      <span style={{ color:'#c8a86b', fontFamily:"'Inter', sans-serif", fontSize:'10px', letterSpacing:'0.08em' }}>{accountLabels[p.account]}</span>
                      <span style={{ color:'#8d8b86', fontFamily:"'Inter', sans-serif", fontSize:'10px' }}>{p.time}</span>
                    </div>
                    {p.content}
                  </div>
                ))}
              </div>
            )}

            {recordTab === 'reaction' && (
              <div>
                <div style={labelStyle}>対象の投稿</div>
                <div style={{ marginBottom:'18px' }}>
                  {savedPosts.map(p => (
                    <div key={p.id} onClick={()=>setSelectedPostId(p.id)}
                      style={{ ...cardStyle, cursor:'pointer', marginBottom:'10px', border: '1px solid ' + (selectedPostId===p.id ? '#c8a86b' : 'rgba(255,255,255,0.08)'), background: selectedPostId===p.id ? 'rgba(200,168,107,0.06)' : 'transparent' }}>
                      <div style={{ display:'flex', justifyContent:'space-between', marginBottom:'4px' }}>
                        <span style={{ color:'#c8a86b', fontFamily:"'Inter', sans-serif", fontSize:'10px' }}>{accountLabels[p.account]}</span>
                        <span style={{ color:'#8d8b86', fontFamily:"'Inter', sans-serif", fontSize:'10px' }}>{p.time}</span>
                      </div>
                      <div style={{ fontSize:'12.5px', color:'#c9c7c2' }}>{p.content.slice(0,40)}{p.content.length>40?'…':''}</div>
                    </div>
                  ))}
                </div>

                <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:'10px', marginBottom:'8px' }}>
                  <div><div style={labelStyle}>いいね</div><input style={inputStyle} type="number" inputMode="numeric" value={reactionDraft.likes} onChange={e=>setReactionDraft({...reactionDraft, likes:e.target.value})} placeholder="0" /></div>
                  <div><div style={labelStyle}>リポスト</div><input style={inputStyle} type="number" inputMode="numeric" value={reactionDraft.reposts} onChange={e=>setReactionDraft({...reactionDraft, reposts:e.target.value})} placeholder="0" /></div>
                  <div><div style={labelStyle}>返信数</div><input style={inputStyle} type="number" inputMode="numeric" value={reactionDraft.repliesCount} onChange={e=>setReactionDraft({...reactionDraft, repliesCount:e.target.value})} placeholder="0" /></div>
                </div>

                <div style={{ ...labelStyle, margin:'18px 0 10px' }}>返信 ＋ 返答</div>
                {replyPairs.map((r, i) => (
                  <div key={i} style={{ ...cardStyle, padding:'14px 16px' }}>
                    <input style={{ ...inputStyle, marginBottom:'10px', fontSize:'12px' }} placeholder="相手（ID/名前）" value={r.from} onChange={e=>updateReplyPair(i,'from',e.target.value)} />
                    <textarea style={{ ...inputStyle, minHeight:'50px', marginBottom:'10px', fontSize:'13px' }} placeholder="相手の返信内容" value={r.content} onChange={e=>updateReplyPair(i,'content',e.target.value)} />
                    <textarea style={{ ...inputStyle, minHeight:'50px', marginBottom:'8px', fontSize:'13px' }} placeholder="こちらの返答" value={r.response} onChange={e=>updateReplyPair(i,'response',e.target.value)} />
                    {replyPairs.length > 1 && (
                      <button onClick={()=>removeReplyPair(i)} style={{ background:'transparent', border:'none', color:'#8d8b86', fontFamily:"'Inter', sans-serif", fontSize:'11px', cursor:'pointer', padding:0 }}>－ 削除</button>
                    )}
                  </div>
                ))}
                <button onClick={addReplyPair} style={{ ...copyBtnStyle(false), marginBottom:'18px' }}>＋ 返信を追加</button>

                <button style={primaryBtn} onClick={submitReaction}>{saveStatus==='saving' ? '保存中…' : saveStatus==='saved' ? '保存しました ✓' : saveStatus==='error' ? '保存失敗（再試行）' : '反応を記録する'}</button>
              </div>
            )}
          </div>
        )}

        {/* BUSINESS (horizontal slide) */}
        {activeMain === 'business' && (
          <div style={{ height:'100%', position:'relative' }}>
            {bgGlow}
            <div ref={bizStripRef} onScroll={handleBizScroll} style={{ display:'flex', height:'100%', overflowX:'auto', overflowY:'hidden', scrollSnapType:'x mandatory', scrollBehavior:'smooth', WebkitOverflowScrolling:'touch' }}>
              {sectionPanels.map((panel, idx) => (
                <div key={idx} style={{ minWidth:'100vw', height:'100%', scrollSnapAlign:'center', display:'flex', flexDirection:'column', padding:'20px 24px 24px', overflowY:'auto', boxSizing:'border-box' }}>
                  <div style={{ margin:'6vh 0 4vh' }}>
                    <div style={{ fontFamily:"'Inter', sans-serif", fontSize:'11px', letterSpacing:'0.3em', color:'#c8a86b', marginBottom:'12px' }}>{panel.no}</div>
                    <h2 style={{ fontFamily:"'Shippori Mincho B1', serif", fontWeight:600, fontSize:'clamp(28px,8vw,40px)', lineHeight:1.2, margin:0, whiteSpace:'pre-wrap' }}>{panel.title}</h2>
                    <p style={{ color:'#8d8b86', fontSize:'13px', fontWeight:300, marginTop:'6px', margin:0 }}>{panel.sub}</p>
                  </div>
                  <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'20px 12px', borderTop:'1px solid rgba(255,255,255,0.08)', padding:'24px 0' }}>
                    {panel.stats.map((stat,i) => (
                      <div key={i}>
                        <div style={{ fontSize:'11px', color:'#8d8b86', marginBottom:'4px' }}>{stat.k}</div>
                        <div style={{ fontFamily:"'Inter', sans-serif", fontSize:'24px', fontWeight:300 }}>{stat.v}{stat.u && <small style={{ fontSize:'12px', color:'#8d8b86', marginLeft:'2px' }}>{stat.u}</small>}</div>
                      </div>
                    ))}
                  </div>
                  {panel.note && <div style={{ borderTop:'1px solid rgba(255,255,255,0.08)', padding:'20px 0', fontSize:'13px', lineHeight:1.9, color:'#8d8b86', fontWeight:300 }}>{panel.note}</div>}
                  <div style={{ marginTop:'auto', display:'flex', flexDirection:'column', gap:'10px', paddingBottom:'8px' }}>
                    {panel.links.map((link,i) => (
                      <a key={i} href={link.url} target="_blank" rel="noopener noreferrer" style={{ display:'flex', justifyContent:'space-between', alignItems:'center', textDecoration:'none', color:'#e9e7e2', border:'1px solid rgba(255,255,255,0.08)', borderRadius:'14px', padding:'16px 18px', fontSize:'13px', fontWeight:500, letterSpacing:'0.04em' }}>
                        {link.text}<span style={{ fontFamily:"'Inter', sans-serif", color:'#c8a86b', fontSize:'12px' }}>→</span>
                      </a>
                    ))}
                  </div>
                </div>
              ))}
            </div>
            <nav style={{ position:'absolute', left:0, right:0, bottom:'10px', display:'flex', justifyContent:'center', gap:'10px', zIndex:5 }}>
              {sectionPanels.map((_, idx) => (
                <button key={idx} onClick={()=>scrollToBiz(idx)} style={{ width: businessPanel===idx?'18px':'5px', height:'5px', borderRadius: businessPanel===idx?'3px':'50%', background: businessPanel===idx?'#c8a86b':'rgba(255,255,255,0.22)', transition:'all .3s', cursor:'pointer', border:'none', padding:0 }} aria-label={`パネル${idx+1}`} />
              ))}
            </nav>
          </div>
        )}
      </div>

      {/* BOTTOM NAV */}
      <nav style={{ display:'flex', borderTop:'1px solid rgba(255,255,255,0.08)', background:'#17171a', paddingBottom:'env(safe-area-inset-bottom,0)' }}>
        {mainTabs.map(t => {
          const active = activeMain === t.id;
          const color = active ? '#c8a86b' : '#8d8b86';
          const icons = {
            home: (
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                <path d="M4 11.5L12 4l8 7.5" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
                <path d="M6 10v9a1 1 0 001 1h3v-6h4v6h3a1 1 0 001-1v-9" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
              </svg>
            ),
            feed: (
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                <circle cx="12" cy="12" r="1.6" fill={color}/>
                <path d="M8.2 8.2a5.4 5.4 0 000 7.6M15.8 8.2a5.4 5.4 0 010 7.6" stroke={color} strokeWidth="1.5" strokeLinecap="round"/>
                <path d="M5 5a9.8 9.8 0 000 14M19 5a9.8 9.8 0 010 14" stroke={color} strokeWidth="1.5" strokeLinecap="round" opacity="0.6"/>
              </svg>
            ),
            record: (
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                <path d="M6 4h9l4 4v12a1 1 0 01-1 1H6a1 1 0 01-1-1V5a1 1 0 011-1z" stroke={color} strokeWidth="1.5" strokeLinejoin="round"/>
                <path d="M9 12h6M9 15.5h6M9 8.5h3" stroke={color} strokeWidth="1.5" strokeLinecap="round"/>
              </svg>
            ),
            business: (
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                <rect x="4" y="4" width="7" height="7" rx="1.2" stroke={color} strokeWidth="1.5"/>
                <rect x="13" y="4" width="7" height="7" rx="1.2" stroke={color} strokeWidth="1.5" opacity="0.6"/>
                <rect x="4" y="13" width="7" height="7" rx="1.2" stroke={color} strokeWidth="1.5" opacity="0.6"/>
                <rect x="13" y="13" width="7" height="7" rx="1.2" stroke={color} strokeWidth="1.5" opacity="0.35"/>
              </svg>
            )
          };
          return (
            <button key={t.id} onClick={()=>setActiveMain(t.id)} style={{
              flex:1, background:'transparent', border:'none', padding:'12px 0 10px', cursor:'pointer',
              display:'flex', flexDirection:'column', alignItems:'center', gap:'5px'
            }}>
              {icons[t.id]}
              <span style={{ fontFamily:"'Inter', sans-serif", fontSize:'10px', letterSpacing:'0.06em', color }}>{t.label}</span>
            </button>
          );
        })}
      </nav>
    </div>
  );
}

const rootEl = document.getElementById('root');
ReactDOM.createRoot(rootEl).render(React.createElement(MoutonsDashboard));
</script>
</body>
</html>
