<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>ISAI Mouton 本部</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0f1013;--surface:#1a1b20;--surface2:#212229;--border:#2b2c34;
  --text:#eceef2;--sub:#8a8d99;--accent:#4a8cff;--gold:#e0b25c;--red:#e2554e;--green:#4ade80;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,"Hiragino Kaku Gothic ProN",sans-serif;padding-bottom:40px;}

.header{padding:20px 18px 14px;position:sticky;top:0;background:var(--bg);z-index:10;border-bottom:1px solid var(--border);}
.header h1{font-size:17px;font-weight:700;}
.header p{font-size:11px;color:var(--sub);margin-top:2px;}

.wrap{max-width:520px;margin:0 auto;padding:16px;}

/* KPI */
.kpi-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px;}
.kpi{background:var(--surface);border-radius:12px;padding:12px 8px;text-align:center;}
.kpi .n{font-size:20px;font-weight:700;color:var(--accent);}
.kpi .l{font-size:10px;color:var(--sub);margin-top:3px;}

/* セクション共通 */
.section{background:var(--surface);border-radius:14px;padding:16px;margin-bottom:14px;}
.section-title{font-size:12px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;}
.section-title .badge{background:var(--surface2);color:var(--accent);font-size:10px;padding:2px 8px;border-radius:10px;}

/* マインドセット */
.mindset{font-size:15px;line-height:1.7;color:var(--gold);text-align:center;padding:10px 4px;min-height:50px;display:flex;align-items:center;justify-content:center;}

/* タスク */
.task-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);}
.task-row:last-child{border-bottom:none;}
.task-check{width:22px;height:22px;border-radius:6px;border:2px solid var(--border);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;color:transparent;transition:all .2s;}
.task-check.done{background:var(--green);border-color:var(--green);color:#0a1a0f;}
.task-text{flex:1;font-size:14px;}
.task-text.done{color:var(--sub);text-decoration:line-through;}
.task-tag{font-size:10px;color:var(--sub);}

.add-row{display:flex;gap:8px;margin-top:12px;}
.add-input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;color:var(--text);font-size:14px;}
.add-btn{background:var(--accent);color:#fff;border:none;border-radius:10px;padding:0 18px;font-size:14px;font-weight:700;cursor:pointer;}
.add-btn:active{opacity:.8;}

/* スタッフ */
.staff-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;}
.staff-name{font-size:13px;font-weight:600;}
.staff-role{font-size:11px;color:var(--sub);}
.staff-dot{width:8px;height:8px;border-radius:50%;background:var(--green);}
.staff-dot.idle{background:var(--sub);}

/* メモ */
.memo-textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px;color:var(--text);font-size:14px;min-height:80px;resize:vertical;font-family:inherit;}
.memo-save{margin-top:10px;background:var(--surface2);border:1px solid var(--border);color:var(--sub);border-radius:10px;padding:10px;width:100%;font-size:13px;cursor:pointer;}
.memo-save:active{opacity:.8;}
.memo-saved-at{font-size:10px;color:var(--sub);margin-top:6px;text-align:right;}

.empty{text-align:center;color:var(--sub);font-size:13px;padding:20px 0;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--surface2);color:var(--text);padding:10px 20px;border-radius:20px;font-size:13px;opacity:0;transition:all .3s;z-index:100;border:1px solid var(--border);}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}

.back-link{display:inline-block;margin-top:6px;font-size:11px;color:var(--accent);text-decoration:none;}
.building-link{background:none;border:1px solid var(--border);color:var(--sub);font-size:11px;letter-spacing:.1em;padding:6px 14px;border-radius:20px;cursor:pointer;margin-left:8px;}

/* ══════ 到着トランジション ══════ */
#deskTransition{position:fixed;inset:0;background:#0a0908;z-index:9999;display:none;align-items:center;justify-content:center;flex-direction:column;font-family:-apple-system,sans-serif;}
#deskTransition.show{display:flex;}
.desk-step{font-size:13px;letter-spacing:.25em;color:#a08b72;opacity:0;text-align:center;}
.desk-step.on{animation:deskStepIn 1s ease forwards;}
@keyframes deskStepIn{0%{opacity:0;transform:translateY(10px);filter:blur(6px);}100%{opacity:1;transform:translateY(0);filter:blur(0);}}
.desk-icon{font-size:34px;margin-bottom:14px;opacity:0;}
.desk-icon.on{animation:deskStepIn 1s ease forwards;}
.exit-flash{position:fixed;inset:0;background:#000;opacity:0;z-index:10000;pointer-events:none;}
.exit-flash.fadeout{animation:exitFadeOut 1.2s ease forwards;}
@keyframes exitFadeOut{to{opacity:1;}}
</style>
</head>
<body>

<div class="header">
  <h1>🏢 ISAI Mouton 本部</h1>
  <p>実務・今日やること — シンプル入力モード</p>
  <a class="back-link" href="./isai_mouton_v2.html">← シネマティック版へ</a>
  <button class="building-link" onclick="exitToBuilding()">ビルへ移動 →</button>
</div>

<div class="exit-flash" id="exitFlash"></div>
<div id="deskTransition">
  <div class="desk-icon" id="deskIcon"></div>
  <p class="desk-step" id="deskStep"></p>
</div>

<div class="wrap">

  <div class="kpi-row">
    <div class="kpi"><p class="n" id="kpiStaff">—</p><p class="l">稼働中STAFF</p></div>
    <div class="kpi"><p class="n" id="kpiTask">—</p><p class="l">未完了タスク</p></div>
    <div class="kpi"><p class="n" id="kpiDone">—</p><p class="l">今日の完了</p></div>
  </div>

  <div class="section">
    <p class="section-title">MINDSET</p>
    <p class="mindset" id="mindsetText">読み込み中…</p>
  </div>

  <div class="section">
    <p class="section-title">今日のタスク <span class="badge" id="taskBadge">0</span></p>
    <div id="taskList"><div class="empty">タスクなし</div></div>
    <div class="add-row">
      <input type="text" id="taskInput" class="add-input" placeholder="タスクを追加…">
      <button class="add-btn" onclick="addTask()">＋</button>
    </div>
  </div>

  <div class="section">
    <p class="section-title">STAFF ステータス</p>
    <div id="staffList"><div class="empty">データなし</div></div>
  </div>

  <div class="section">
    <p class="section-title">クイックメモ</p>
    <textarea id="memoBox" class="memo-textarea" placeholder="思いついたこと、次にやることをサッと書く…"></textarea>
    <button class="memo-save" onclick="saveMemo()">保存する</button>
    <p class="memo-saved-at" id="memoSavedAt"></p>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
var GAS_URL = 'https://script.google.com/macros/s/AKfycbxC3bwIaLFQeZlvOCs1xHrA5dcRzDhejGY8qFYJuGNjBkWnWlQ2DOK7cJcfKXPsdmi5KQ/exec';

var MINDSETS = [
  '完璧は後です。60点で出す。',
  '今の事業に固執しない。',
  '時間とお金を、最短最速で。',
  '準備は好きだ。でも今日は実行の日。',
  'SHOHEYを動かして、利益を上げる。'
];
document.getElementById('mindsetText').textContent = MINDSETS[Math.floor(Math.random()*MINDSETS.length)];

/* ══════ ローカルタスク管理（即実用・localStorage） ══════ */
var LS_TASK_KEY = 'isai_ops_tasks';
var LS_MEMO_KEY = 'isai_ops_memo';

function loadTasks(){
  try { return JSON.parse(localStorage.getItem(LS_TASK_KEY)) || []; }
  catch(e){ return []; }
}
function saveTasks(tasks){ localStorage.setItem(LS_TASK_KEY, JSON.stringify(tasks)); }

function renderTasks(){
  var tasks = loadTasks();
  var list = document.getElementById('taskList');
  var open = tasks.filter(function(t){ return !t.done; }).length;
  var doneToday = tasks.filter(function(t){ return t.done && t.doneDate === todayStr(); }).length;
  document.getElementById('taskBadge').textContent = open;
  document.getElementById('kpiTask').textContent = open;
  document.getElementById('kpiDone').textContent = doneToday;

  if(!tasks.length){ list.innerHTML = '<div class="empty">タスクなし。下から追加してください</div>'; return; }
  var html = '';
  tasks.forEach(function(t, i){
    html += '<div class="task-row">';
    html += '<div class="task-check'+(t.done?' done':'')+'" onclick="toggleTask('+i+')">'+(t.done?'✓':'')+'</div>';
    html += '<div class="task-text'+(t.done?' done':'')+'">'+escapeHtml(t.text)+'</div>';
    html += '</div>';
  });
  list.innerHTML = html;
}
function todayStr(){ var d = new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function escapeHtml(s){ var d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

function addTask(){
  var input = document.getElementById('taskInput');
  var text = input.value.trim();
  if(!text) return;
  var tasks = loadTasks();
  tasks.unshift({ text:text, done:false, doneDate:null });
  saveTasks(tasks);
  input.value = '';
  renderTasks();
  showToast('✅ タスクを追加しました');
}
function toggleTask(i){
  var tasks = loadTasks();
  tasks[i].done = !tasks[i].done;
  tasks[i].doneDate = tasks[i].done ? todayStr() : null;
  saveTasks(tasks);
  renderTasks();
}
document.getElementById('taskInput').addEventListener('keydown', function(e){ if(e.key==='Enter') addTask(); });

/* ══════ クイックメモ ══════ */
function loadMemo(){
  var saved = localStorage.getItem(LS_MEMO_KEY);
  if(saved){
    try {
      var obj = JSON.parse(saved);
      document.getElementById('memoBox').value = obj.text || '';
      if(obj.time) document.getElementById('memoSavedAt').textContent = '最終保存: '+obj.time;
    } catch(e){}
  }
}
function saveMemo(){
  var text = document.getElementById('memoBox').value;
  var time = new Date().toLocaleString('ja-JP', {month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});
  localStorage.setItem(LS_MEMO_KEY, JSON.stringify({text:text, time:time}));
  document.getElementById('memoSavedAt').textContent = '最終保存: '+time;
  showToast('✅ メモを保存しました');
}

/* ══════ GASからスタッフ・タスク実データ取得 ══════ */
function loadLiveData(){
  fetch(GAS_URL + '?action=getAll', {cache:'no-store'})
    .then(function(r){ return r.json(); })
    .then(function(res){
      if(!res || !res.ok) return;
      var data = res.data;
      var staff = (data && data.staff) || [];
      document.getElementById('kpiStaff').textContent = staff.length;

      var staffList = document.getElementById('staffList');
      if(!staff.length){ staffList.innerHTML = '<div class="empty">スタッフデータなし</div>'; return; }
      var html = '';
      staff.forEach(function(s){
        var active = s.status && s.status !== '待機' && s.status !== '休止';
        html += '<div class="staff-row"><div><p class="staff-name">'+(s.name||'')+'</p><p class="staff-role">'+(s.role||'')+'</p></div>';
        html += '<div class="staff-dot'+(active?'':' idle')+'"></div></div>';
      });
      staffList.innerHTML = html;
    })
    .catch(function(){ /* GAS未接続でも問題なく動く */ });
}

function showToast(msg){
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2000);
}

renderTasks();
loadMemo();
loadLiveData();

/* ══════ デスク到着演出（バリエーション複数） ══════ */
function playDeskArrival(){
  var overlay = document.getElementById('deskTransition');
  var icon = document.getElementById('deskIcon');
  var step = document.getElementById('deskStep');
  overlay.classList.add('show');

  var variants = [
    { icon:'🚪', steps:['デスクに到着した', '椅子に座る', 'スケジュールnoteを開く…'] },
    { icon:'☕', steps:['コーヒーを置く', '今日のタスクを確認する', '準備完了'] },
    { icon:'💡', steps:['デスクライトをつける', 'ノートPCを開く', 'さあ、始めよう'] }
  ];
  var v = variants[Math.floor(Math.random()*variants.length)];
  icon.textContent = v.icon;

  var i = 0;
  function nextStep(){
    icon.classList.remove('on'); step.classList.remove('on');
    void icon.offsetWidth; // reflow
    icon.classList.add('on');
    step.textContent = v.steps[i];
    step.classList.add('on');
    i++;
    if(i < v.steps.length){ setTimeout(nextStep, 1100); }
    else { setTimeout(function(){ overlay.classList.remove('show'); }, 1200); }
  }
  nextStep();
}

/* ══════ ビルへ移動（退出演出） ══════ */
function exitToBuilding(){
  var flash = document.getElementById('exitFlash');
  flash.classList.add('fadeout');
  sessionStorage.setItem('isai_transition', 'fromDesk');
  setTimeout(function(){ location.href = './isai_mouton_v2.html'; }, 1100);
}

/* 起動時：ビルから来た場合は到着演出を再生 */
(function(){
  if(sessionStorage.getItem('isai_transition') === 'toDesk'){
    sessionStorage.removeItem('isai_transition');
    playDeskArrival();
  }
})();
</script>
</body>
</html>
