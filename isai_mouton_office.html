<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none}

#game{display:block;width:100vw;height:100vh;image-rendering:pixelated;image-rendering:crisp-edges}

/* ── TITLE ── */
#title{position:fixed;inset:0;z-index:100;background:radial-gradient(ellipse at 50% 30%,#2a2418,#0d0c0a 75%);display:flex;flex-direction:column;align-items:center;justify-content:center;color:#f0e6d0}

@keyframes logoFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
#title .sub{font-size:11px;color:#cfc8ba;letter-spacing:4px;margin-top:10px}
#title .start{position:absolute;bottom:14%;font-size:12px;animation:blink2 1.1s steps(2) infinite;letter-spacing:2px}
@keyframes blink2{50%{opacity:.15}}

/* ── SKIP ── */
#skipBtn{position:fixed;top:calc(env(safe-area-inset-top) + 12px);right:14px;z-index:110;background:rgba(26,23,18,.8);color:#cfc8ba;border:2px solid #4a443a;font-size:11px;font-family:inherit;padding:7px 14px;border-radius:4px;display:none;letter-spacing:1px}
#skipBtn.show{display:block}

/* ── OPENING CAPTION ── */
#opCap{position:fixed;left:0;right:0;bottom:16%;z-index:105;text-align:center;color:#f0e6d0;font-size:clamp(12px,3.4vw,16px);letter-spacing:1px;text-shadow:2px 2px 0 rgba(0,0,0,.6);display:none;line-height:1.9;padding:0 8vw}

#fade{position:fixed;inset:0;background:#0d0c0a;z-index:90;opacity:0;pointer-events:none;transition:opacity .45s}
#fade.on{opacity:1;pointer-events:all}
#flash{position:fixed;inset:0;background:#fff;z-index:95;opacity:0;pointer-events:none;transition:opacity .2s}
#flash.on{opacity:.9}

/* ── HUD ── */
#hud{position:fixed;top:0;left:0;right:0;display:flex;align-items:center;justify-content:space-between;padding:calc(env(safe-area-inset-top) + 8px) 12px 8px;pointer-events:none;z-index:10}
#hud .ttl{background:#1a1712;color:#f0a832;border:2px solid #f0a832;font-size:11px;font-weight:bold;padding:4px 10px;letter-spacing:1px;box-shadow:2px 2px 0 rgba(0,0,0,.4)}
#hqLink{pointer-events:all;background:rgba(26,23,18,.9);color:#cfc8ba;border:2px solid #4a443a;font-size:10px;padding:5px 10px;box-shadow:2px 2px 0 rgba(0,0,0,.4);text-decoration:none;font-family:inherit}

/* ── DIALOG ── */
#dlg{position:fixed;left:50%;bottom:110px;transform:translateX(-50%);width:min(92vw,520px);background:#1a1712;border:3px solid #f0e6d0;border-radius:4px;box-shadow:0 0 0 3px #1a1712,4px 6px 0 rgba(0,0,0,.5);padding:12px 14px;z-index:20;display:none;color:#f0e6d0}
#dlg.show{display:block;animation:pop .12s steps(2)}
@keyframes pop{from{transform:translateX(-50%) scale(.92)}}
#dlg .nm{font-size:11px;font-weight:bold;color:#f0a832;margin-bottom:6px;letter-spacing:1px}
#dlg .tx{font-size:13px;line-height:1.7;white-space:pre-wrap}
#dlg .nx{position:absolute;right:10px;bottom:6px;font-size:10px;color:#8a8272;animation:blink 1s steps(2) infinite}

/* ── FLOOR SELECT ── */
#fsel{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);width:min(88vw,340px);background:#1a1712;border:3px solid #f0e6d0;border-radius:4px;box-shadow:0 0 0 3px #1a1712,4px 6px 0 rgba(0,0,0,.5);z-index:25;display:none;color:#f0e6d0}

.pk{position:absolute;width:44px;height:44px;background:#3a352c;border:2px solid #6a6152;border-radius:8px;color:#cfc8ba;font-size:16px;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 0 #1a1712}

#pU{left:44px;top:0}#pD{left:44px;top:88px}#pL{left:0;top:44px}#pR{left:88px;top:44px}

#btnA:active{transform:translateY(3px);box-shadow:0 1px 0 #7a2a08}

#sync{position:fixed;bottom:calc(env(safe-area-inset-bottom) + 6px);left:50%;transform:translateX(-50%);font-size:9px;color:#6a6152;z-index:9}

/* ════════ PALETTES ════════
   sk=skin, hr=hair, hi=hair highlight, sh=shirt, s2=shirt shade, pt=pants, cap=帽子(optional) */
const PAL={
 player:{sk:'#f6cfa4',hr:'#2b241c',hi:'#4a3c2c',sh:'#d94f2a',s2:'#a83318',pt:'#2c3a56',cap:'#c2410c',capHi:'#e8653a'},
 recep: {sk:'#f8d6b0',hr:'#3a2c22',hi:'#5c4634',sh:'#f4f1ea',s2:'#d8d2c4',pt:'#404a5e'},
 croppy:{sk:'#f6cfa4',hr:'#4a3520',hi:'#6a4e30',sh:'#e08214',s2:'#b05e04',pt:'#33302a'},
 sec:   {sk:'#f6cfa4',hr:'#241f1c',hi:'#403630',sh:'#37507e',s2:'#24365c',pt:'#282e3c'},

 tng:   {sk:'#eab88c',hr:'#20201e',hi:'#3a3a36',sh:'#42b8a6',s2:'#2a8a7a',pt:'#24443c'},
 mil:   {sk:'#f6cfa4',hr:'#463020',hi:'#664a32',sh:'#7478f4',s2:'#5054d0',pt:'#2c2a6c'},
 zero:  {sk:'#fdf3e6',hr:'#f0e4cc',hi:'#fff8ea',sh:'#f8efe0',s2:'#dccfb8',pt:'#b08484'},
 kak:   {sk:'#f6cfa4',hr:'#2c1640',hi:'#48286a',sh:'#a44ef2',s2:'#7e2ecc',pt:'#402058'},
 mb:    {sk:'#f6cfa4',hr:'#243620',hi:'#3c5434',sh:'#48b862',s2:'#2e8a44',pt:'#1e402a'},
 mb2:   {sk:'#eab88c',hr:'#1c2a1a',hi:'#324a2e',sh:'#3aa053',s2:'#26783c',pt:'#1a3824'},
 blk:   {sk:'#eab88c',hr:'#141414',hi:'#2e2e2e',sh:'#464646',s2:'#2a2a2a',pt:'#141414'},
 blk2:  {sk:'#f6cfa4',hr:'#1a1a1a',hi:'#343434',sh:'#3a3a42',s2:'#22222a',pt:'#101014'},
};

/* ════════ DP-STYLE SPRITES 14x18 ════════
   o=outline h=hair H=hair-hi f=skin e=eye w=eye-white m=mouth
   s=shirt 2=shirt-shade p=pants x=shoe c=cap C=cap-hi */
const SPR={
 down:[
"....oooooo....",
"...ohhhhhho...",
"..ohHhhhhHho..",
"..ohhhhhhhho..",
"..ohhhhhhhho..",
"..ohffffffho..",
"..offweewffo..",
"..offffffffo..",
"...offmmffo...",

"..osossssoso..",
"..ofos22sofo..",
"...oss22sso...",
"...opppppo....",
"...opo..opo...",
"...oxo..oxo...",
 ],
 up:[
"....oooooo....",
"...ohhhhhho...",
"..ohhhhhhhho..",
"..ohHhhhhHho..",
"..ohhhhhhhho..",
"..ohhhhhhhho..",
"..ohhhhhhhho..",
"..ohhhhhhhho..",
"...ohhhhhho...",
"....ohhho.....",
"...oossssoo...",

"..osossssoso..",

"...opppppo....",
"...opo..opo...",

 ],
 side:[
".....ooooo....",
"....ohhhhho...",
"...ohhhhhhho..",
"...ohHhhhhho..",
"...ohhhhhhho..",
"...ohhffffoo..",
"...ohfwefff...",

"....osssso....",
"...os2ssssoo..",
"...ososssofo..",
"...ofos22so...",
"....oss2so....",
"....opppo.....",
"....opo.opo...",
"....oxo.oxo...",
 ],
};
/* player cap rows (down): replace hair top with cap */
const CAP_DOWN=[
"....oooooo....",
"...occccccо...",
"..ocCccccCco..",
"..occcccccco..",
"..ohhhhhhhho..",
];
function applyCap(rows){
 const r=rows.slice();
 r[0]="....oooooo....";
 r[1]="...occcccco...";
 r[2]="..ocCccccCco..";
 r[3]="..occcccccco..";
 return r;
}
function legsSwap(rows){
 const r=rows.slice();
 const a=r[16],b=r[17];
 // stride: 左右の脚を前後に
 r[16]=a.replace(/opo(\s*|\.*)opo/,'opo..opo');
 // simple offset walk frame
 r[16]="..opo....opo..".slice(0,14);
 r[17]="..oxo....oxo..".slice(0,14);
 return r;
}
function sitRows(rows){
 // 上半身のみ + 椅子
 const r=rows.slice(0,15);
 r.push("...oPPPPPPo...");
 r.push("....oPPPPo....");
 r.push("..............");
 return r;
}

function drawSprite(kind,frame,px,py,scale,palKey,flip,alpha,sitting,hasCap){
 const pal=PAL[palKey]||PAL.player;
 const map={
  o:'#181410',h:pal.hr,H:pal.hi,f:pal.sk,e:'#181410',w:'#f8f6f0',m:'#b06848',
  s:pal.sh,'2':pal.s2,p:pal.pt,x:'#241e18',c:pal.cap||pal.hr,C:pal.capHi||pal.hi,P:'#6a5238'
 };
 let rows=SPR[kind]||SPR.down;
 if(hasCap&&kind==='down')rows=applyCap(rows);
 if(sitting)rows=sitRows(rows);
 else if(frame===1)rows=legsSwap(rows);
 cx.save();
 cx.translate(px,py);
 if(flip){cx.translate(14*scale,0);cx.scale(-1,1)}
 cx.globalAlpha=alpha;
 for(let r=0;r<rows.length;r++){
  const row=rows[r];
  for(let c=0;c<row.length;c++){
   const ch=row[c];if(ch==='.'||ch===' ')continue;
   cx.fillStyle=map[ch]||'#000';
   cx.fillRect(Math.round(c*scale),Math.round(r*scale),Math.ceil(scale),Math.ceil(scale));
  }
 }
 cx.restore();
 cx.globalAlpha=1;
}

/* ════════ STATE ════════ */
let phase='title'; // title -> opening -> play
let floorIdx=0;
function F(){return FLOORS[floorIdx]}
const solid=new Set();
function K(x,y){return x+','+y}
function buildSolid(){
 solid.clear();
 const f=F();
 for(let x=0;x<f.w;x++){solid.add(K(x,0));solid.add(K(x,f.h-1))}
 for(let y=0;y<f.h;y++){solid.add(K(0,y));solid.add(K(f.w-1,y))}
 (f.desks||[]).forEach(d=>{solid.add(K(d.x,d.y));solid.add(K(d.x+1,d.y))});
 (f.plants||[]).forEach(p=>solid.add(K(p.x,p.y)));
 if(f.board)solid.add(K(f.board.x,f.board.y));
 if(f.recep){solid.add(K(f.recep.x,f.recep.y));solid.add(K(f.recep.x+1,f.recep.y));solid.add(K(f.recep.x+2,f.recep.y))}
}
function blocked(x,y){return solid.has(K(Math.floor(x),Math.floor(y)))}

const player={x:8,y:8,mv:false,fr:0,dir:'u'};
const SPD=4.0;

/* ════════ LIVE DATA (shared w/ HQ app) ════════ */
let LIVE=null; // {staff:[...], tasks:[...], nextActions:[...], loop:[...]}
const DEMO_STATUS={croppy:'作業中',sec:'作業中',tsumg:'作業中',tng:'報告あり',mil:'作業中',zero:'作業中',kak:'作業中',sapo:'待機',coach:'待機',lens:'待機',edit:'待機'};
async function syncData(){
 const ep=getEndpoint();
 const lbl=document.getElementById('sync');
 if(!ep){LIVE=null;applyStatuses();lbl.textContent='デモ稼働（司令室⚙で接続すると実データ連動）';return}
 try{
  const res=await fetch(ep+(ep.includes('?')?'&':'?')+'action=getAll',{cache:'no-store'});
  const j=await res.json();
  if(j.ok){LIVE=j.data;applyStatuses();lbl.textContent='実データ連動中 ('+new Date().toLocaleTimeString('ja-JP')+')'}
  else throw new Error(j.error);
 }catch(e){lbl.textContent='接続エラー・デモ稼働中';LIVE=null;applyStatuses()}
}
function statusOf(id){
 if(LIVE&&LIVE.staff){
  const s=LIVE.staff.find(r=>r.staff_id===id);
  if(s)return {st:s.ステータス||'作業中',now:s.現在の作業||''};
 }
 return {st:DEMO_STATUS[id]||'作業中',now:''};
}
function taskStats(){
 if(LIVE&&LIVE.tasks){
  const t=LIVE.tasks;
  return {run:t.filter(x=>x.状態==='進行中').length,done:t.filter(x=>x.状態==='完了').length};
 }
 return {run:4,done:3};
}
function reportCount(){
 let c=0;
 FLOORS.forEach(f=>f.npcs.forEach(n=>{if(statusOf(n.id).st==='報告あり')c++}));
 return c;
}
function applyStatuses(){
 FLOORS.forEach(f=>f.npcs.forEach(n=>{
  if(n.fixed)return; // 受付は常勤
  const {st}=statusOf(n.id);
  n.liveStatus=st;
 }));
}
setInterval(syncData,60000);
syncData();

/* ════════ FLOOR SPAWN ════════ */
function spawnFloor(idx,fromElev){
 floorIdx=idx;buildSolid();
 const f=F();

function drawOpening(dt){
 opT+=dt;
 const W=cv.width,H=cv.height;
 const prog=Math.min(1,opT/OP_LEN);
 // sky gradient (morning)
 const g=cx.createLinearGradient(0,0,0,H);
 g.addColorStop(0,'#7ec3e8');g.addColorStop(.55,'#c9e4ee');g.addColorStop(.72,'#f0d9b8');g.addColorStop(1,'#8a8272');
 cx.fillStyle=g;cx.fillRect(0,0,W,H);
 // sun

 cx.fillStyle='#8fa4ac';

 }
 // road
 cx.fillStyle='#6a6156';cx.fillRect(0,H*.72,W,H*.28);
 cx.fillStyle='#f0e6d0';
 const dashOff=(opT*260)%80;
 for(let x=-80;x<W+80;x+=80){
  cx.fillRect(x-dashOff,H*.84,40,Z*2);
 }
 // ─ target building: grows as we approach ─
 const bScale=.25+prog*1.15;
 const bw=W*.34*bScale, bh=H*.52*bScale;
 const bx=W*.62-bw/2+(1-prog)*W*.25, by=H*.72-bh;
 // body
 cx.fillStyle='#5c5248';cx.fillRect(bx,by,bw,bh);
 cx.fillStyle='#6e6254';cx.fillRect(bx,by,bw,bh*.06);
 // windows
 cx.fillStyle='#cfe4ea';

function npcTick(n,dt){
 if(n.mode==='sleep'){n.fr+=dt;return}
 if(n.mode==='work'){
  n.fr+=dt*5;
  return;
 }
 // report: wander near desk + bubble
 n.stateT-=dt;
 const dx=n.tx-n.px,dy=n.ty-n.py,dist=Math.hypot(dx,dy);
 if(dist<.08){
  if(n.stateT<=0){
   n.stateT=3+Math.random()*4;
   n.bub=pick(n.lines);n.bubT=3;
  }
  n.tx=n.desk.x-1.2+Math.random()*3;n.ty=n.desk.y+1.8+Math.random()*2;
  if(blocked(n.tx,n.ty)){n.tx=n.px;n.ty=n.py}
  return;
 }
 const sp=1.25*dt;let nx=n.px+dx/dist*sp,ny=n.py+dy/dist*sp;
 n.dir=Math.abs(dx)>Math.abs(dy)?(dx>0?'r':'l'):(dy>0?'d':'u');
 if(!blocked(nx,ny)){n.px=nx;n.py=ny;n.fr+=dt*7}
 else{n.tx=n.px;n.ty=n.py}
}
function pick(a){return a[Math.floor(Math.random()*a.length)]}

/* ════════ INTERACT ════════ */
function nearestTarget(){
 const f=F();
 let best=null,bd=1.7;
 f.npcs.forEach(n=>{
  const d=Math.hypot(n.px-player.x,n.py-player.y);
  if(d<bd){bd=d;best={type:'npc',n}}
 });
 if(f.board){
  const d=Math.hypot(f.board.x+.5-player.x,f.board.y+1-player.y);
  if(d<1.8&&(!best||d<bd)){bd=d;best={type:'kpi'}}
 }
 if(f.led){
  const d=Math.hypot(f.led.x+f.led.w/2-player.x,f.led.y+1.3-player.y);
  if(d<2.2&&(!best||d<bd)){bd=d;best={type:'led'}}
 }
 const e=elevOf(f);
 const ed=Math.hypot(e.x+1-player.x,e.y+.8-player.y);
 if(ed<1.7&&(!best||ed<bd))best={type:'elev'};
 return best;
}
function handleA(){
 if(phase==='title'){startOpening();return}
 if(phase==='opening'){endOpening();return}
 if(fselOpen){closeFsel();return}
 if(dlgOpen){closeDlg();return}
 if(phase!=='play')return;
 const t=nearestTarget();
 if(!t)return;
 if(t.type==='npc'){
  const n=t.n;
  const {st,now}=n.fixed?{st:'作業中',now:''}:statusOf(n.id);
  const label=n.mode==='sleep'?'（待機中）':n.mode==='work'?'（作業中）':'（報告あり❕）';
  const extra=now?'\n▸ いま: '+now:'';
  openDlg(n.nm+' '+label,'『'+pick(n.lines)+'』\n'+n.role+extra);
 }else if(t.type==='kpi'){
  let msg='';
  if(LIVE&&LIVE.kpi&&LIVE.kpi.length){
   const k=LIVE.kpi[LIVE.kpi.length-1];
   msg='Threadsフォロワー: '+k['Threadsフォロワー']+'\n投稿数: '+k['投稿数']+'\nLINK接触: '+k['LINK接触']+'\nnote売上: ¥'+k['note売上']+'\nLINK会員: '+k['LINK会員数']+' / 100';
  }else{
   msg='Threadsフォロワー: 128\n投稿数: 3\nLINK接触: 2\nnote売上: ¥0\nLINK会員: 24 / 100\n（デモ表示）';
  }
  openDlg('社内掲示板 — Today\'s KPI',msg);
 }else if(t.type==='led'){
  const st=taskStats();
  openDlg('LEDビジョン','本日のタスク状況\n▸ 進行中: '+st.run+'件\n▸ 完了: '+st.done+'件\n▸ 報告あり: '+reportCount()+'名\n\n詳細は司令室アプリでどうぞ（右上📱）');
 }else if(t.type==='elev'){
  openFsel();
 }
}

function resize(){
 cv.width=innerWidth;cv.height=innerHeight;
 Z=Math.max(2,Math.min(4,Math.floor(Math.min(innerWidth,innerHeight)/(T*10))));
 cx.imageSmoothingEnabled=false;
}
addEventListener('resize',resize);resize();

let last=0;
function loop(t){
 const dt=Math.min(.05,(t-last)/1000)||0;last=t;perf=t;
 if(phase==='opening'){drawOpening(dt);requestAnimationFrame(loop);return}
 if(phase==='play'){
  if(!dlgOpen&&!fselOpen){
   let dx=0,dy=0;
   if(key.u)dy-=1;if(key.d)dy+=1;if(key.l)dx-=1;if(key.r)dx+=1;
   player.mv=(dx!==0||dy!==0);
   if(player.mv){
    const m=Math.hypot(dx,dy);dx/=m;dy/=m;
    player.dir=Math.abs(dx)>Math.abs(dy)?(dx>0?'r':'l'):(dy>0?'d':'u');
    let nx=player.x+dx*SPD*dt,ny=player.y+dy*SPD*dt;
    const R=.28;
    if(!blocked(nx+Math.sign(dx)*R,player.y))player.x=nx;
    if(!blocked(player.x,ny+Math.sign(dy)*R))player.y=ny;
    player.fr+=dt*7;
   }
   F().npcs.forEach(n=>{npcTick(n,dt);if(n.bubT>0)n.bubT-=dt});
  }
  const f=F();
  const vw=cv.width/(T*Z),vh=cv.height/(T*Z);
  cam.x=Math.max(0,Math.min(Math.max(0,f.w-vw),player.x-vw/2));
  cam.y=Math.max(0,Math.min(Math.max(0,f.h-vh),player.y-vh/2));
  if(f.w<vw)cam.x=(f.w-vw)/2;
  if(f.h<vh)cam.y=(f.h-vh)/2;
  drawWorld();
  const chars=f.npcs.map(n=>({y:n.py,fn:()=>drawChar(n,false)}));
  chars.push({y:player.y,fn:()=>drawChar(null,true)});
  chars.sort((a,b)=>a.y-b.y).forEach(c=>c.fn());
  f.npcs.forEach(drawBub);
  const tg=nearestTarget();
  if(tg&&!dlgOpen&&!fselOpen){
   const e=elevOf(f);
   if(tg.type==='npc')drawMark(tg.n.px,tg.n.py);
   else if(tg.type==='kpi')drawMark(f.board.x+.5,f.board.y+1.4);
   else if(tg.type==='led')drawMark(f.led.x+f.led.w/2,f.led.y+1.6);
   else drawMark(e.x+1,e.y+1);
  }
 }
 requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>

<script>
function openOfficeGasSetting() {
  /* portal v3と同じキーも参照して自動入力 */
  var current = localStorage.getItem('isai_hq_endpoint')
             || localStorage.getItem('isai_mouton_gas_url')
             || '';
  var url = prompt('GASのデプロイURLを入力してください\n（portal v3と同じURLでOK）', current);
  if (url !== null) {
    var trimmed = url.trim();
    localStorage.setItem('isai_hq_endpoint', trimmed);
    /* portal v3側のキーにも同時保存 */
    localStorage.setItem('isai_mouton_gas_url', trimmed);
    alert(trimmed ? '✅ GAS接続完了！ページをリロードします。' : '🔌 未接続モードに戻しました');
    location.reload();
  }
}
</script>
